<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTS 物流對點轉運系統 (線上雲端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; background-color: #eff6ff; }
        .hidden-tab { display: none; }
        .compact-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        .calc-btn { @apply h-14 text-xl font-bold rounded-xl bg-gray-100 active:bg-gray-300 flex items-center justify-center shadow-sm; }
        .zone-北 { border-left: 6px solid #3b82f6; } .zone-中 { border-left: 6px solid #10b981; } .zone-南 { border-left: 6px solid #f59e0b; }
        .unit-tag { @apply text-[10px] px-2 py-0.5 rounded-md font-bold; }
        .bg-unit-北 { background: #dbeafe; color: #1e40af; } .bg-unit-中 { background: #d1fae5; color: #065f46; } .bg-unit-南 { background: #ffedd5; color: #9a3412; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 select-none overflow-x-hidden">

    <div class="sticky top-0 z-50 shadow-sm">
        <div id="sync-status" class="bg-yellow-500 text-white text-[11px] text-center py-1 font-bold">
            雲端連線中...
        </div>
        <nav class="bg-white border-b">
            <div class="flex justify-around items-center h-14 max-w-5xl mx-auto">
                <button onclick="switchTab('check')" id="nav-check" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">現場對點</button>
                <button onclick="switchTab('loading')" id="nav-loading" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">精細配載</button>
                <button onclick="switchTab('report')" id="nav-report" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">報表/遞延</button>
                <button onclick="switchTab('manage')" id="nav-manage" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">維護管理</button>
            </div>
        </nav>
    </div>

    <main class="p-3 max-w-5xl mx-auto pb-24 mt-2">
        <section id="tab-check" class="space-y-3">
            <div class="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border">
                <button onclick="dailyReset()" class="bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-xs active:scale-95">日結清空</button>
                <div id="check-header" class="text-blue-600 font-black text-sm truncate">請先點選廠商卡片</div>
            </div>
            <div id="check-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="check-workspace" class="hidden space-y-3">
                <div class="flex gap-2 overflow-x-auto pb-1" id="check-unit-tabs"></div>
                <div id="check-items-container" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-loading" class="hidden-tab space-y-4">
            <div id="truck-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            <div id="load-selector" class="hidden fixed inset-0 bg-white z-[60] overflow-y-auto p-4">
                <div class="flex justify-between items-center border-b pb-3 mb-4 sticky top-0 bg-white">
                    <div>
                        <h3 id="load-title" class="font-black text-lg text-blue-700">車次配載</h3>
                        <p class="text-[11px] text-slate-400">雲端即時鎖定分配，防止跨車重複載貨</p>
                    </div>
                    <button onclick="closeLoad()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold shadow-md">儲存並關閉</button>
                </div>
                <div id="load-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="tab-report" class="hidden-tab space-y-4">
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button onclick="toggleRepMode('item')" id="btn-rep-item" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600">商品報表</button>
                <button onclick="toggleRepMode('defer')" id="btn-rep-defer" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500">區域遞延單</button>
            </div>
            <div id="rep-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="report-unit-filter-block" class="hidden flex gap-2 overflow-x-auto pb-1"></div>
            <div id="report-content" class="space-y-4"></div>
        </section>

        <section id="tab-manage" class="hidden-tab space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-blue-600 pl-2 mb-4">車次設定</h2>
                <div id="m-trucks" class="space-y-3"></div>
                <button onclick="dbAdd('trucks')" class="w-full mt-3 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg text-xs font-bold">+ 新增車次</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-green-600 pl-2 mb-4">廠商與品項分層</h2>
                <div id="m-vendors" class="space-y-4"></div>
                <button onclick="dbAdd('vendors')" class="w-full mt-3 py-2 border-2 border-dashed border-green-300 text-green-600 rounded-lg text-xs font-bold">+ 新增廠商</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-orange-500 pl-2 mb-4">單位與分區設定</h2>
                <div id="m-units" class="space-y-2"></div>
                <button onclick="dbAdd('units')" class="w-full mt-3 py-2 border-2 border-dashed border-orange-300 text-orange-600 rounded-lg text-xs font-bold">+ 新增單位</button>
            </div>
        </section>
    </main>

    <div id="calc-pop" class="fixed inset-0 bg-black/60 z-[100] hidden items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex flex-col"><span id="calc-label" class="font-black text-blue-600 text-lg">數量輸入</span><span class="text-[10px] text-slate-400">點擊 = 執行累加舊值</span></div>
                <button onclick="closeCalc()" class="text-slate-400 bg-slate-100 p-2 rounded-full">✕</button>
            </div>
            <div class="bg-slate-100 p-6 rounded-2xl text-right mb-6">
                <div id="calc-hist" class="text-slate-400 text-sm h-6 font-mono"></div>
                <div id="calc-disp" class="text-5xl font-black text-slate-800 font-mono">0</div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button class="calc-btn" onclick="cInput('7')">7</button><button class="calc-btn" onclick="cInput('8')">8</button><button class="calc-btn" onclick="cInput('9')">9</button><button class="calc-btn bg-orange-100 text-orange-600" onclick="cOp('+')">+</button>
                <button class="calc-btn" onclick="cInput('4')">4</button><button class="calc-btn" onclick="cInput('5')">5</button><button class="calc-btn" onclick="cInput('6')">6</button><button class="calc-btn bg-red-100 text-red-600" onclick="cClear()">C</button>
                <button class="calc-btn" onclick="cInput('1')">1</button><button class="calc-btn" onclick="cInput('2')">2</button><button class="calc-btn" onclick="cInput('3')">3</button><button class="calc-btn bg-blue-600 text-white row-span-2" onclick="cOk()">＝</button>
                <button class="calc-btn col-span-2" onclick="cInput('0')">0</button><button class="calc-btn" onclick="cInput('.')">.</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ⚠️ 請在此處填入您在 Firebase 申請的 Realtime Database 網址
        const FIREBASE_DB_URL = "https://lts-system2-default-rtdb.firebaseio.com/"; 

        // 初始化 Firebase
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
        const dbRef = firebase.database().ref("LTS_SYSTEM_DATA");

        let db = {
            trucks: [{name:'北區車01', limit:500, targets:['八堵','五股']}],
            vendors: [{name:'鮮食廠', mode:'detail', items:[{name:'便當', pcs:12},{name:'三明治', pcs:10}]}],
            units: [{name:'八堵', zone:'北', type:'A'},{name:'五股', zone:'北', type:'A'},{name:'嘉義', zone:'南', type:'B'}],
            tally: {},    
            loads: {},    
            tracks: {},
            okStatus: {}
        };

        const state = { tab: 'check', curV: null, curU: 'all', repMode: 'item', repV: null, repU: 'all', calc: null, activeTruck: null };

        const save = () => {
            document.getElementById('sync-status').innerText = "雲端同步中...";
            document.getElementById('sync-status').className = "bg-blue-600 text-white text-[11px] text-center py-1 font-bold";
            dbRef.set(db).then(() => {
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                refreshUI();
            }).catch(err => {
                document.getElementById('sync-status').innerText = "⚠️ 同步失敗，檢查網路";
                document.getElementById('sync-status').className = "bg-red-600 text-white text-[11px] text-center py-1 font-bold";
            });
        };

        dbRef.on('value', (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                db = cloudData;
                if(!db.tally) db.tally = {};
                if(!db.loads) db.loads = {};
                if(!db.tracks) db.tracks = {};
                if(!db.okStatus) db.okStatus = {};
                for (let t in db.loads) { if (Array.isArray(db.loads[t])) { db.loads[t] = {}; } }
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                if(state.activeTruck && !document.getElementById('load-selector').classList.contains('hidden')){
                    openLoad(state.activeTruck);
                } else {
                    refreshUI();
                }
            } else {
                save();
            }
        });

        function getFinalBox(vName, uName, pName) {
            const vendor = db.vendors.find(v => v.name === vName);
            const key = `${vName}_${uName}_${pName}`;
            const data = db.tally[key] || { box: 0, rem: 0, offset: 0 };
            if (vendor && vendor.mode === 'sum') return { display: `${data.box}箱`, total: (data.box||0) + (data.offset||0) };
            const carry = (data.rem||0) > 0 ? 1 : 0;
            const total = (data.box||0) + carry + (data.offset||0);
            return { display: `${data.box||0}箱 ${data.rem||0}尾`, total };
        }

        function renderCheck() {
            const vGrid = document.getElementById('check-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="selVendor('${v.name}')" class="p-2 rounded-xl border-2 text-[11px] font-black shadow-sm ${state.curV===v.name?'border-blue-600 bg-blue-50 text-blue-700':'bg-white border-transparent'}">
                    ${v.name}
                </button>
            `).join('');

            if (state.curV) {
                const vendor = db.vendors.find(v => v.name === state.curV);
                document.getElementById('check-workspace').classList.remove('hidden');
                document.getElementById('check-header').innerText = `正在點收：${state.curV}`;
                
                document.getElementById('check-unit-tabs').innerHTML = `<button onclick="state.curU='all';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU==='all'?'bg-blue-600 text-white':'bg-white border'}">全部展開</button>` +
                    db.units.map(u => `<button onclick="state.curU='${u.name}';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU===u.name?'bg-blue-600 text-white':'bg-white border'}">${u.name}</button>`).join('');

                const units = state.curU === 'all' ? db.units : db.units.filter(u => u.name === state.curU);
                document.getElementById('check-items-container').innerHTML = units.map(u => `
                    <div class="bg-white p-3 rounded-xl shadow-sm zone-${u.zone}">
                        <div class="flex justify-between items-center mb-2 border-b pb-1">
                            <span class="font-black text-xs">${u.name}</span>
                            <span class="unit-tag bg-unit-${u.zone}">${u.zone}區 / 單${u.type}</span>
                        </div>
                        ${vendor.mode==='detail' ? (vendor.items||[]).map(p => {
                            const key = `${vendor.name}_${u.name}_${p.name}`;
                            const d = db.tally[key] || { box: 0, rem: 0, offset: 0 };
                            const stats = getFinalBox(vendor.name, u.name, p.name);
                            return `
                                <div class="flex items-center gap-2 py-2 border-b last:border-0">
                                    <div class="flex-1"><div class="font-bold text-xs">${p.name}</div><div class="text-[9px] text-slate-400">箱入:${p.pcs}</div></div>
                                    <div class="flex gap-1 items-center">
                                        <div onclick="openCalc('${key}','box',${d.box||0},'${p.name}-箱')" class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center font-black text-xs">${d.box||0}</div>
                                        <div onclick="openCalc('${key}','rem',${d.rem||0},'${p.name}-尾')" class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center font-bold text-blue-600 text-xs">${d.rem||0}</div>
                                        <div class="flex flex-col gap-1 mx-1">
                                            <button onclick="adjOff('${key}',1)" class="w-8 h-4 bg-green-50 text-green-600 rounded text-[10px] font-bold">+1</button>
                                            <button onclick="adjOff('${key}',-1)" class="w-8 h-4 bg-red-50 text-red-600 rounded text-[10px] font-bold">-1</button>
                                        </div>
                                        <div class="w-10 text-center">
                                            <div class="text-[10px] font-black text-blue-700">${stats.total}</div>
                                            <div class="text-[8px] text-slate-300">總箱</div>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('') : `
                            <div class="flex justify-between items-center p-2">
                                <span class="text-xs font-bold text-slate-400">總箱數點收</span>
                                <div onclick="openCalc('${vendor.name}_${u.name}_SUM','box',${(db.tally[`${vendor.name}_${u.name}_SUM`]||{box:0}).box||0},'總箱數')" class="w-20 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-black text-lg">${(db.tally[`${vendor.name}_${u.name}_SUM`]||{box:0}).box||0}</div>
                            </div>`}
                    </div>
                `).join('');
            }
        }

        function renderLoading() {
            const grid = document.getElementById('truck-grid');
            grid.innerHTML = db.trucks.map(t => {
                const loadedObj = db.loads[t.name] || {};
                let currentLoad = 0;
                let summaryHtml = Object.keys(loadedObj).map(k => {
                    const boxAllocated = loadedObj[k] || 0;
                    if (boxAllocated <= 0) return '';
                    const [vn, un, pn] = k.split('_');
                    currentLoad += boxAllocated;
                    const z = db.units.find(u=>u.name===un)?.zone || '北';
                    return `<div class="flex justify-between bg-unit-${z} p-1 mb-1 rounded text-[9px] font-bold"><span>${un} | ${vn} - ${pn==='SUM'?'總箱':pn}</span><span>${boxAllocated}箱</span></div>`;
                }).join('');

                return `
                    <div onclick="openLoad('${t.name}')" class="bg-white p-4 rounded-xl shadow-sm border-l-8 border-blue-600 active:bg-slate-50">
                        <div class="flex justify-between mb-2">
                            <span class="font-black text-sm">${t.name}</span>
                            <span class="text-xs font-bold ${currentLoad>t.limit?'text-red-500':'text-blue-600'}">${currentLoad} / ${t.limit} 箱</span>
                        </div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full mb-3"><div class="bg-blue-600 h-full rounded-full" style="width:${Math.min(currentLoad/t.limit*100,100)}%"></div></div>
                        <div class="space-y-1">${summaryHtml || '<div class="text-[10px] text-slate-300 text-center py-2">待載入...</div>'}</div>
                    </div>`;
            }).join('');
        }

        // 🛠 終極防呆升級：直接拆解真實對點資料庫 (tally)，繞過所有廠商主檔硬性限制！
        function openLoad(tn) {
            state.activeTruck = tn;
            const truck = db.trucks.find(x => x.name === tn) || { targets: [] };
            document.getElementById('load-selector').classList.remove('hidden');
            document.getElementById('load-title').innerText = `${tn} 配載`;
            
            if (!db.loads[tn]) db.loads[tn] = {};

            // 1. 掃描目前所有存在對點數值的【單位】與【廠商與商品對應】
            const tallyStructure = {}; 
            Object.keys(db.tally).forEach(key => {
                const parts = key.split('_');
                if (parts.length >= 2) {
                    const vName = parts[0];
                    const uName = parts[1];
                    const pName = parts[2] || 'SUM';
                    
                    const tInfo = db.tally[key];
                    const totalBox = getFinalBox(vName, uName, pName).total;

                    if (totalBox > 0) {
                        if (!tallyStructure[uName]) tallyStructure[uName] = {};
                        if (!tallyStructure[uName][vName]) tallyStructure[uName][vName] = [];
                        tallyStructure[uName][vName].push({ pName, maxBox: totalBox, key });
                    }
                }
            });

            // 2. 確保車次設定的目的地就算剛好沒貨，也會納入清單結構中
            (truck.targets || []).forEach(tgt => {
                if (!tallyStructure[tgt]) tallyStructure[tgt] = {};
            });

            let html = "";
            
            // 3. 開始渲染每個目的地
            Object.keys(tallyStructure).forEach(tgt => {
                const uObj = db.units.find(u => u.name === tgt);
                const z = uObj?.zone || '北';
                const isConfiguredTarget = (truck.targets || []).includes(tgt);
                
                let headerAddon = isConfiguredTarget ? '' : ' <span class="text-[9px] bg-red-500 text-white px-1 py-0.5 rounded ml-2">非固定車次路線</span>';
                html += `<div class="bg-slate-100 p-2 rounded-lg font-black text-xs text-slate-700 mb-2 border-l-4 zone-${z}">${tgt} 目的地${headerAddon}</div>`;

                const vendorsInUnit = tallyStructure[tgt];
                if (Object.keys(vendorsInUnit).length === 0) {
                    html += `<div class="text-[11px] text-slate-300 pl-4 py-2 mb-2 italic">該單位目前尚無對點貨物資料</div>`;
                    return;
                }

                // 渲染該單位底下的所有對點廠商
                Object.keys(vendorsInUnit).forEach(vName => {
                    const cargoItems = vendorsInUnit[vName];
                    let vendorId = `v_${tn}_${tgt}_${vName}`.replace(/\s+/g, '');

                    const isVendorAllChecked = cargoItems.every(item => {
                        return db.loads[tn][item.key] === item.maxBox;
                    });

                    html += `
                        <div class="border rounded-xl bg-white shadow-sm p-3 mb-3">
                            <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg mb-2">
                                <label class="flex items-center font-black text-xs text-slate-800">
                                    <input type="checkbox" class="w-4 h-4 mr-2 rounded" ${isVendorAllChecked?'checked':''} 
                                        onchange="toggleVendorGroupDirect('${tn}','${tgt}','${vName}', this.checked)">
                                    ${vName}
                                </label>
                                <button onclick="document.getElementById('${vendorId}').classList.toggle('hidden')" class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded font-bold">展開/收合</button>
                            </div>
                            <div id="${vendorId}" class="pl-2 space-y-2">`;

                    cargoItems.forEach(item => {
                        let otherTruck = null;
                        for (let otherT in db.loads) {
                            if (otherT !== tn && (db.loads[otherT][item.key]||0) > 0) {
                                otherTruck = otherT;
                                break;
                            }
                        }

                        let currentAllocated = db.loads[tn][item.key] !== undefined ? db.loads[tn][item.key] : 0;
                        const isChecked = currentAllocated > 0;

                        html += `
                            <div class="flex items-center justify-between py-2 border-b last:border-0 text-xs ${otherTruck?'opacity-40':''}">
                                <label class="flex items-center flex-1 font-medium">
                                    <input type="checkbox" class="w-4 h-4 mr-2" ${isChecked?'checked':''} ${otherTruck?'disabled':''} 
                                        onchange="toggleItemSingle('${tn}','${item.key}', ${item.maxBox}, this.checked)">
                                    <div>
                                        <span class="font-bold">${item.pName==='SUM'?'總箱點收':item.pName}</span>
                                        <span class="text-[10px] text-slate-400 block">總: ${item.maxBox}箱</span>
                                    </div>
                                </label>
                                <div class="flex items-center gap-1">
                                    ${otherTruck ? `
                                        <span class="text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold">${otherTruck}</span>
                                    ` : `
                                        <input type="number" min="0" max="${item.maxBox}" class="w-12 border rounded text-center p-1 font-black text-blue-600" 
                                            value="${currentAllocated}" 
                                            onchange="updateAllocatedBoxes('${tn}','${item.key}',${item.maxBox}, this.value)">
                                        <span class="text-[10px] text-slate-400">箱</span>
                                    `}
                                </div>
                            </div>`;
                    });

                    html += `</div></div>`;
                });
            });

            document.getElementById('load-list').innerHTML = html || "<div class='py-20 text-center text-slate-300'>此車次與全台對點暫無任何貨物數據</div>";
        }

        // 專為直接資料流設計的批次勾選
        function toggleVendorGroupDirect(tn, tgt, vName, isChecked) {
            Object.keys(db.tally).forEach(key => {
                if (key.startsWith(`${vName}_${tgt}_`)) {
                    const maxBox = getFinalBox(vName, tgt, key.split('_')[2]||'SUM').total;
                    let isLocked = false;
                    for (let otherT in db.loads) { if (otherT !== tn && (db.loads[otherT][key]||0) > 0) isLocked = true; }
                    if (!isLocked && maxBox > 0) db.loads[tn][key] = isChecked ? maxBox : 0;
                }
            });
            dbRef.set(db);
        }

        function toggleItemSingle(tn, key, maxBox, isChecked) {
            db.loads[tn][key] = isChecked ? maxBox : 0;
            dbRef.set(db);
        }

        function updateAllocatedBoxes(tn, key, maxBox, value) {
            let val = parseInt(value) || 0;
            if (val > maxBox) val = maxBox;
            if (val < 0) val = 0;
            db.loads[tn][key] = val;
            dbRef.set(db);
        }

        function closeLoad() {
            state.activeTruck = null;
            document.getElementById('load-selector').classList.add('hidden');
            save();
        }

        function toggleRepMode(m) {
            state.repMode = m;
            const btnItem = document.getElementById('btn-rep-item');
            const btnDefer = document.getElementById('btn-rep-defer');
            if (m === 'item') {
                btnItem.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600";
                btnDefer.className = "flex-1 py-2 rounded-lg font-bold text-sm text-slate-500";
                document.getElementById('report-unit-filter-block').classList.remove('hidden');
            } else {
                btnDefer.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-orange-600";
                btnItem.className = "flex-1 py-2 rounded-lg font-bold text-sm text-slate-500";
                document.getElementById('report-unit-filter-block').classList.add('hidden');
            }
            renderReport();
        }

        function renderReport() {
            const vGrid = document.getElementById('rep-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="state.repV='${v.name}';renderReport()" class="p-2 rounded-lg border text-[10px] font-bold ${state.repV===v.name?'bg-blue-600 text-white':'bg-white text-slate-500'}">
                    ${v.name}
                </button>
            `).join('');
            
            const uFilterBlock = document.getElementById('report-unit-filter-block');
            if (state.repMode === 'item') {
                uFilterBlock.innerHTML = `<button onclick="state.repU='all';renderReport()" class="px-3 py-1 rounded-full text-[10px] font-bold whitespace-nowrap ${state.repU==='all'?'bg-slate-800 text-white':'bg-white border'}">全部單位</button>` +
                    db.units.map(u => `<button onclick="state.repU='${u.name}';renderReport()" class="px-3 py-1 rounded-full text-[10px] font-bold whitespace-nowrap ${state.repU===u.name?'bg-slate-800 text-white':'bg-white border'}">${u.name}</button>`).join('');
            }

            const content = document.getElementById('report-content');
            if (!state.repV) { content.innerHTML = "<div class='text-center py-12 text-slate-300'>請先點選廠商</div>"; return; }
            const vendor = db.vendors.find(v => v.name === state.repV);
            if(!vendor) return;

            if (state.repMode === 'item') {
                let html = `<div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-600"><h3 class="font-black text-[11px] text-blue-600 mb-3">📋 ${state.repV} 明細覆點</h3>`;
                const filteredUnits = state.repU === 'all' ? db.units : db.units.filter(u => u.name === state.repU);
                
                filteredUnits.forEach(u => {
                    // 覆點報表相容性防呆：直接動態讀取，避免名稱死板卡死
                    Object.keys(db.tally).forEach(key => {
                        if (key.startsWith(`${vendor.name}_${u.name}_`)) {
                            const pName = key.split('_')[2] || 'SUM';
                            if (!db.tracks[key]) db.tracks[key] = [0,0,0,0];
                            const t = db.tracks[key];
                            const stats = getFinalBox(vendor.name, u.name, pName);
                            const isOk = db.okStatus && db.okStatus[key] === true;
                            const rowBgColor = isOk ? 'bg-green-50 border border-green-200' : 'bg-white';
                            const displayDebt = t[0] !== 0 ? Math.abs(t[0]) : '';

                            html += `
                                <div class="p-2 my-1 rounded-xl transition-colors ${rowBgColor}">
                                    <div class="flex justify-between items-center mb-1">
                                        <div class="flex gap-1.5 items-center truncate">
                                            <span class="font-bold text-[11px] bg-slate-200 px-1.5 py-0.5 rounded">${u.name}</span>
                                            <span class="font-bold text-[11px] text-slate-700 truncate">${pName==='SUM'?'總箱數':pName}</span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="text-[11px] font-black text-blue-600">${stats.display}</span>
                                            <button onclick="toggleItemOk('${key}')" class="px-2.5 py-1 rounded-lg text-[10px] font-black shadow-sm transition-all ${isOk ? 'bg-green-600 text-white' : 'bg-gray-100 text-slate-400 active:bg-gray-200'}">
                                                ${isOk ? '✅ OK' : '完成'}
                                            </button>
                                        </div>
                                    </div>
                                    <div class="flex gap-1 items-center mt-1">
                                        <input type="number" min="0" class="w-16 border rounded text-center text-[10px] bg-red-50 text-red-600 font-bold" value="${displayDebt}" onchange="tkE('${key}',0,this.value, true)" placeholder="欠(正數)">
                                        <input type="number" class="w-11 border rounded text-center text-[10px]" value="${t[1]||0}" onchange="tkE('${key}',1,this.value)" placeholder="補1">
                                        <input type="number" class="w-11 border rounded text-center text-[10px]" value="${t[2]||0}" onchange="tkE('${key}',2,this.value)" placeholder="補2">
                                        <input type="number" class="w-11 border rounded text-center text-[10px]" value="${t[3]||0}" onchange="tkE('${key}',3,this.value)" placeholder="補3">
                                        <div class="ml-auto font-black text-xs ${((t[0]||0)+(t[1]||0)+(t[2]||0)+(t[3]||0))<0?'text-red-500':'text-green-600'}">差: ${(t[0]||0)+(t[1]||0)+(t[2]||0)+(t[3]||0)}</div>
                                    </div>
                                </div>`;
                        }
                    });
                });
                content.innerHTML = html + "</div>";
            } else {
                const getZoneTotal = (type) => db.units.filter(u=>u.type===type).reduce((acc,u)=>acc+calcU(vendor.name, u.name),0);
                content.innerHTML = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border-t-8 border-blue-600">
                        <div class="text-[10px] text-slate-400">遞延單 A (北區/台中/新市)</div>
                        <div class="text-4xl font-black text-blue-600 my-2">${getZoneTotal('A')} <span class="text-sm">箱</span></div>
                        <div class="grid grid-cols-2 gap-2 mt-4">${db.units.filter(u=>u.type==='A').map(u=>`<div class="p-2 border rounded text-[10px] font-bold bg-slate-50">${u.name}: <span class="text-blue-600">${calcU(vendor.name, u.name)}</span></div>`).join('')}</div>
                    </div>
                    <div class="bg-white p-5 rounded-xl shadow-sm border-t-8 border-orange-500">
                        <div class="text-[10px] text-slate-400">遞延單 B (南區)</div>
                        <div class="text-4xl font-black text-orange-500 my-2">${getZoneTotal('B')} <span class="text-sm">箱</span></div>
                        <div class="grid grid-cols-2 gap-2 mt-4">${db.units.filter(u=>u.type==='B').map(u=>`<div class="p-2 border rounded text-[10px] font-bold bg-slate-50">${u.name}: <span class="text-orange-500">${calcU(vendor.name, u.name)}</span></div>`).join('')}</div>
                    </div>`;
            }
        }

        function toggleItemOk(key) {
            if (!db.okStatus) db.okStatus = {};
            db.okStatus[key] = !db.okStatus[key];
            save();
        }

        function renderManage() {
            document.getElementById('m-trucks').innerHTML = (db.trucks||[]).map((t, i) => `
                <div class="p-3 bg-slate-50 rounded-xl border border-blue-100 space-y-2">
                    <div class="flex gap-2 items-center"><input class="font-bold bg-transparent flex-1 border-b text-sm" value="${t.name}" onchange="dbE('trucks',${i},'name',this.value)"><input type="number" class="w-16 border-b text-center font-bold text-blue-600 text-sm" value="${t.limit}" onchange="dbE('trucks',${i},'limit',this.value)"><button onclick="dbD('trucks',${i})" class="text-red-400">✕</button></div>
                    <div class="flex flex-wrap gap-1">${db.units.map(u => `<button onclick="tglTgt(${i},'${u.name}')" class="text-[10px] px-2.5 py-1 rounded border ${(t.targets||[]).includes(u.name)?'bg-blue-600 text-white border-blue-600':'bg-white text-slate-400'}">${u.name}</button>`).join('')}</div>
                </div>`).join('');

            document.getElementById('m-vendors').innerHTML = (db.vendors||[]).map((v, vi) => `
                <div class="border p-3 rounded-xl bg-slate-50 space-y-2">
                    <div class="flex gap-2 items-center"><input class="font-black bg-transparent flex-1 border-b text-sm" value="${v.name}" onchange="dbE('vendors',${vi},'name',this.value)"><select class="text-[10px] border p-1 rounded" onchange="dbE('vendors',${vi},'mode',this.value)"><option value="detail" ${v.mode==='detail'?'selected':''}>明細對點</option><option value="sum" ${v.mode==='sum'?'selected':''}>僅點總箱</option></select><button onclick="dbD('vendors',${vi})" class="text-red-400">✕</button></div>
                    ${v.mode==='detail' ? `<div class="pl-4 border-l-4 border-green-200 space-y-2">${(v.items||[]).map((p, pi) => `<div class="flex gap-2"><input class="text-xs border-b flex-1" value="${p.name}" onchange="subE(${vi},${pi},'name',this.value)"><input type="number" class="w-12 border-b text-center text-xs" value="${p.pcs}" onchange="subE(${vi},${pi},'pcs',this.value)"><button onclick="subD(${vi},${pi})" class="text-slate-300 text-xs">✕</button></div>`).join('')}<button onclick="subA(${vi})" class="text-[10px] text-green-600 font-bold">+ 新增品項</button></div>` : ''}
                </div>`).join('');

            document.getElementById('m-units').innerHTML = (db.units||[]).map((u, i) => `
                <div class="flex gap-2 items-center p-2 border-b"><input class="flex-1 font-bold text-sm" value="${u.name}" onchange="dbE('units',${i},'name',this.value)"><select class="text-[10px] border rounded" onchange="dbE('units',${i},'zone',this.value)"><option value="北" ${u.zone==='北'?'selected':''}>北區</option><option value="中" ${u.zone==='中'?'selected':''}>中區</option><option value="南" ${u.zone==='南'?'selected':''}>南區</option></select><select class="text-[10px] border rounded" onchange="dbE('units',${i},'type',this.value)"><option value="A" ${u.type==='A'?'selected':''}>單A</option><option value="B" ${u.type==='B'?'selected':''}>單B</option></select><button onclick="dbD('units',${i})" class="text-red-300 text-xs">✕</button></div>`).join('');
        }

        function openCalc(k, t, v, l) { state.calc = { k, t, isNew: true, oldVal: v }; document.getElementById('calc-label').innerText = l; document.getElementById('calc-disp').innerText = v; document.getElementById('calc-hist').innerText = ""; document.getElementById('calc-pop').classList.replace('hidden', 'flex'); }
        function cInput(n) { const d = document.getElementById('calc-disp'); if(state.calc.isNew){d.innerText=n; state.calc.isNew=false;} else {d.innerText = d.innerText === '0' ? n : d.innerText + n;} }
        function cOp(op) { const d = document.getElementById('calc-disp'); document.getElementById('calc-hist').innerText = d.innerText + " " + op; state.calc.isNew = true; }
        function cClear() { document.getElementById('calc-disp').innerText = '0'; document.getElementById('calc-hist').innerText = ''; state.calc.isNew = true; }
        function cOk() {
            const d = document.getElementById('calc-disp'); const h = document.getElementById('calc-hist').innerText;
            let res = parseFloat(d.innerText); 
            if(h.includes('+')) res += parseFloat(h); 
            else if(!state.calc.isNew && state.calc.oldVal > 0) res += state.calc.oldVal; 
            const { k, t } = state.calc; if(!db.tally[k]) db.tally[k]={box:0,rem:0,offset:0}; db.tally[k][t] = res; save(); closeCalc();
        }
        function closeCalc() { document.getElementById('calc-pop').classList.replace('flex', 'hidden'); }

        function switchTab(t) { state.tab = t; document.querySelectorAll('section').forEach(s=>s.classList.add('hidden-tab')); document.getElementById('tab-'+t).classList.remove('hidden-tab'); document.querySelectorAll('nav button').forEach(b=>b.className="flex-1 h-full text-sm font-bold text-slate-400 transition-colors"); document.getElementById('nav-'+t).className="flex-1 h-full nav-active"; refreshUI(); }
        function refreshUI() { if(state.tab==='check')renderCheck(); if(state.tab==='loading')renderLoading(); if(state.tab==='report')renderReport(); if(state.tab==='manage')renderManage(); }
        function dbAdd(t) { const o = { trucks:{name:'新車次',limit:500,targets:[]}, vendors:{name:'新廠商',mode:'detail',items:[]}, units:{name:'新單位',zone:'北',type:'A'} }; db[t].push(o[t]); save(); }
        function dbE(t,i,k,v) { db[t][i][k]=v; save(); }
        function dbD(t,i) { if(confirm('確定刪除？')) { db[t].splice(i,1); save(); } }
        function subA(vi) { if(!db.vendors[vi].items) db.vendors[vi].items=[]; db.vendors[vi].items.push({name:'新商品',pcs:10}); save(); }
        function subE(vi,pi,k,v) { db.vendors[vi].items[pi][k]=v; save(); }
        function subD(vi,pi) { db.vendors[vi].items.splice(pi,1); save(); }
        function tglTgt(ti,un) { if(!db.trucks[ti].targets) db.trucks[ti].targets=[]; const idx=db.trucks[ti].targets.indexOf(un); if(idx>-1)db.trucks[ti].targets.splice(idx,1); else db.trucks[ti].targets.push(un); save(); }
        function selVendor(n) { state.curV=n; refreshUI(); }
        function adjOff(k,v) { if(!db.tally[k])db.tally[k]={box:0,rem:0,offset:0}; db.tally[k].offset = (db.tally[k].offset||0) + v; save(); }
        
        function tkE(k, i, v, forceNegative = false) { 
            if(!db.tracks[k]) db.tracks[k]=[0,0,0,0]; 
            let num = parseFloat(v) || 0;
            if (forceNegative && num > 0) { num = -num; }
            db.tracks[k][i] = num; 
            save(); 
        }
        
        function calcU(vn, un) { const v = db.vendors.find(x=>x.name===vn); if(!v)return 0; const items = v.mode==='detail' ? v.items : [{name:'SUM'}]; return items.reduce((acc,p)=>acc+getFinalBox(vn, un, p.name).total, 0); }
        function dailyReset() { if(confirm('【線上日結保險】這將清除所有連線設備今日的對點、配載數據！維護主資料將保留。確定執行？')) { db.tally={}; db.loads={}; db.tracks={}; db.okStatus={}; save(); } }

        switchTab('check');
    </script>
</body>
</html>
