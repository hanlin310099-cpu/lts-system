<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTS 物流對點轉運系統 (實時免刷動態無閃版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 修正 3：調整 Active 樣式，使其在底部導航時更美觀（改為頂部邊框或維持高亮） */
        .nav-active { border-top: 4px solid #2563eb; color: #2563eb; font-weight: 900; background-color: #eff6ff; }
        .hidden-tab { display: none; }
        .compact-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        .calc-btn { @apply h-14 text-xl font-bold rounded-xl bg-gray-100 active:bg-gray-300 flex items-center justify-center shadow-sm; }
        .zone-北 { border-left: 6px solid #3b82f6; } .zone-中 { border-left: 6px solid #10b981; } .zone-南 { border-left: 6px solid #f59e0b; }
        .unit-tag { @apply text-[10px] px-2 py-0.5 rounded-md font-bold; }
        .bg-unit-北 { background: #dbeafe; color: #1e40af; }
        .bg-unit-中 { background: #d1fae5; color: #065f46; }
        .bg-unit-南 { background: #fef3c7; color: #92400e; }
        .bg-unit-全 { background: #f3e8ff; color: #6b21a8; }
        .bg-unit-花 { background: #ffe4e6; color: #9f1239; }
        
        /* 解決滑動過快、隔壁介面畫面殘留的底層優化 */
        body {
            overscroll-behavior-x: none; /* 防止手機瀏覽器左右滑動翻頁或暴衝 */
            -webkit-tap-highlight-color: transparent;
        }
        /* 讓橫向滑動晶片具有定點磁吸阻尼感，防止一滑就飛到最左或最右 */
        .snap-scroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .snap-scroll > * {
            scroll-snap-align: start;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen relative pb-24"> <div class="bg-emerald-600 text-white text-center py-1 px-3 text-xs font-bold sticky top-0 z-50 flex items-center justify-center gap-1.5 shadow-sm">
        <span class="inline-block w-2 h-2 rounded-full bg-white animate-pulse"></span>
        <span id="sync-status">LTS 雲端同步系統已就緒</span>
    </div>

    <main class="max-w-md mx-auto p-3 space-y-4">

        <section id="tab-tally" class="space-y-3">
            <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                <button onclick="clearAllTallyAndLoadAndTrackSet()" class="bg-rose-600 active:bg-rose-700 text-white font-extrabold text-sm px-3 py-2 rounded-lg shadow">🧹 全台日結清空</button>
                <div class="text-right">
                    <span class="text-xs text-slate-400 block font-medium">當前操作區域</span>
                    <span id="current-zone-badge" class="text-sm font-black text-blue-600">載入中...</span>
                </div>
            </div>

            <div class="bg-white p-2 rounded-xl shadow-sm">
                <div id="tally-vendor-list" class="snap-scroll gap-1.5 py-1"></div>
            </div>

            <div id="tally-main-card" class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden hidden">
                <div class="p-4 bg-slate-900 text-white flex justify-between items-center">
                    <div>
                        <h2 id="tally-title" class="text-lg font-black tracking-tight">--</h2>
                        <p id="tally-subtitle" class="text-xs text-slate-400 mt-0.5">--</p>
                    </div>
                    <button onclick="closeTallyCard()" class="text-slate-400 hover:text-white font-bold text-sm bg-slate-800 px-2.5 py-1 rounded-md">返回 ↩</button>
                </div>

                <div id="tally-item-tabs" class="snap-scroll gap-1.5 p-2 bg-slate-50 border-b border-slate-100"></div>

                <div class="p-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 block font-medium">系統計畫生產</span>
                            <span id="val-plan" class="text-xl font-black text-slate-700">0</span>
                        </div>
                        <div id="checked-box-bg" class="bg-blue-50 p-2.5 rounded-xl border border-blue-100 transition-colors">
                            <span class="text-xs text-blue-500 block font-bold">目前實到總箱數</span>
                            <span id="val-checked" class="text-2xl font-black text-blue-600">0</span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="flex gap-2 items-center bg-slate-100 p-2 rounded-xl">
                            <div class="flex-1 text-center">
                                <span class="text-[11px] text-slate-400 block">整箱數</span>
                                <span id="calc-box" class="text-lg font-black text-slate-800">0</span>
                            </div>
                            <div class="text-slate-300 font-light">|</div>
                            <div class="flex-1 text-center">
                                <span class="text-[11px] text-slate-400 block">零散入</span>
                                <span id="calc-rem" class="text-lg font-black text-slate-800">0</span>
                            </div>
                            <div class="text-slate-300 font-light">|</div>
                            <div class="flex-1 text-center">
                                <span class="text-[11px] text-rose-400 block">溢到/扣減</span>
                                <span id="calc-offset" class="text-lg font-black text-rose-600">0</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="pressNum(7)" class="calc-btn">7</button>
                            <button onclick="pressNum(8)" class="calc-btn">8</button>
                            <button onclick="pressNum(9)" class="calc-btn">9</button>
                            <button onclick="pressOp('box')" id="btn-op-box" class="h-14 text-sm font-black rounded-xl bg-blue-600 text-white shadow-md flex flex-col items-center justify-center border-2 border-blue-500"><span>＋整箱</span><span class="text-[10px] font-normal opacity-80" id="btn-op-box-sub">箱=0</span></button>

                            <button onclick="pressNum(4)" class="calc-btn">4</button>
                            <button onclick="pressNum(5)" class="calc-btn">5</button>
                            <button onclick="pressNum(6)" class="calc-btn">6</button>
                            <button onclick="pressOp('rem')" id="btn-op-rem" class="h-14 text-sm font-bold rounded-xl bg-gray-200 text-slate-700 shadow-sm flex flex-col items-center justify-center"><span>＋零散</span><span class="text-[10px] font-normal text-slate-400">個</span></button>

                            <button onclick="pressNum(1)" class="calc-btn">1</button>
                            <button onclick="pressNum(2)" class="calc-btn">2</button>
                            <button onclick="pressNum(3)" class="calc-btn">3</button>
                            <button onclick="pressOp('offset-plus')" id="btn-op-offset-plus" class="h-14 text-xs font-bold rounded-xl bg-gray-200 text-rose-600 shadow-sm flex flex-col items-center justify-center"><span>＋溢到</span><span class="text-[9px] font-normal text-rose-400">調整</span></button>

                            <button onclick="pressNum(0)" class="calc-btn">0</button>
                            <button onclick="pressClear()" class="calc-btn text-rose-500 bg-rose-50 active:bg-rose-100">C</button>
                            <button onclick="pressBackspace()" class="calc-btn text-slate-500">⌫</button>
                            <button onclick="pressOp('offset-minus')" id="btn-op-offset-minus" class="h-14 text-xs font-bold rounded-xl bg-gray-200 text-emerald-600 shadow-sm flex flex-col items-center justify-center"><span>－扣減</span><span class="text-[9px] font-normal text-emerald-400">調整</span></button>
                        </div>
                        <button onclick="commitTally()" class="w-full h-14 bg-emerald-600 active:bg-emerald-700 text-white text-lg font-black rounded-xl shadow-lg transition-all transform active:scale-[0.99] flex items-center justify-center gap-2">💾 確認點收無誤並即時上傳</button>
                    </div>
                </div>
            </div>

            <div id="tally-grid-card" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-sm font-black text-slate-400 mb-3 tracking-wider uppercase">全台合作廠商點收入口</h3>
                <div id="tally-vendor-grid" class="grid grid-cols-2 gap-2.5"></div>
            </div>
        </section>

        <section id="tab-load" class="space-y-3 hidden">
            <div class="bg-white p-2 rounded-xl shadow-sm">
                <div id="load-unit-list" class="snap-scroll gap-1.5 py-1"></div>
            </div>

            <div id="load-main-panel" class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden hidden">
                <div class="p-4 bg-slate-800 text-white flex justify-between items-center">
                    <div>
                        <h2 id="load-panel-title" class="text-base font-black">--</h2>
                        <p id="load-panel-subtitle" class="text-xs text-slate-400 mt-0.5">--</p>
                    </div>
                    <button onclick="closeLoadPanel()" class="text-slate-400 hover:text-white font-bold text-sm bg-slate-700 px-2.5 py-1 rounded-md">返回 ↩</button>
                </div>
                <div class="p-4 space-y-4">
                    <div id="load-item-rows" class="space-y-3 max-h-[320px] overflow-y-auto pr-1"></div>
                    <div class="border-t border-slate-100 pt-3 flex justify-between items-center font-black text-sm text-slate-700">
                        <span>本車累計分配總箱數：</span>
                        <span id="load-panel-total-box" class="text-lg text-blue-600">0 箱</span>
                    </div>
                </div>
            </div>

            <div id="load-truck-list" class="space-y-3"></div>
        </section>

        <section id="tab-report" class="space-y-3 hidden">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <h3 class="text-sm font-black text-slate-400 tracking-wider uppercase">轉運數據動態追蹤報表</h3>
                
                <div id="report-vendor-chips" class="snap-scroll gap-1.5 py-1 border-b border-slate-100 pb-2"></div>
                
                <div id="report-unit-chips" class="snap-scroll gap-1.5 py-1 border-b border-slate-100 pb-2"></div>

                <div class="grid grid-cols-3 gap-2 text-center text-xs font-bold pt-1">
                    <div class="bg-slate-50 p-2 rounded-lg"><span class="text-slate-400 block font-medium mb-0.5">總品項數</span><span id="rep-summary-items" class="text-sm font-black text-slate-700">0</span></div>
                    <div class="bg-blue-50 p-2 rounded-lg"><span class="text-blue-400 block font-medium mb-0.5">已配載箱數</span><span id="rep-summary-loaded" class="text-sm font-black text-blue-600">0</span></div>
                    <div class="bg-rose-50 p-2 rounded-lg"><span class="text-rose-400 block font-medium mb-0.5">未完工餘數</span><span id="rep-summary-remain" class="text-sm font-black text-rose-600">0</span></div>
                </div>
            </div>

            <div id="report-details-container" class="space-y-3"></div>
        </section>

        <section id="tab-maintenance" class="space-y-4 hidden">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                    <h3 class="text-sm font-black text-slate-500 tracking-wider uppercase">🚛 轉運車次主資料管理</h3>
                    <button onclick="addTruckPrompt()" class="bg-blue-600 text-white font-extrabold text-xs px-2.5 py-1.5 rounded-md shadow">＋新增車次</button>
                </div>
                <div id="m-truck-list" class="space-y-2 divide-y divide-slate-50"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                    <h3 class="text-sm font-black text-slate-500 tracking-wider uppercase">🏬 廠商與品項架構設定</h3>
                    <button onclick="addVendorPrompt()" class="bg-blue-600 text-white font-extrabold text-xs px-2.5 py-1.5 rounded-md shadow">＋新增廠商</button>
                </div>
                <div id="m-vendor-list" class="space-y-3"></div>
            </div>

            <div class="bg-rose-50 p-4 rounded-2xl border border-rose-100 space-y-2">
                <h4 class="text-xs font-black text-rose-700 uppercase tracking-wider">⚠️ 進階系統維護專區</h4>
                <p class="text-[11px] text-rose-600 leading-relaxed font-medium">警告：此操作將會清除包含所有廠商、品項、車次在內的全部底層基礎結構主資料，並重置為原廠最初始的預設空白狀態！</p>
                <button onclick="hardResetData()" class="w-full py-2 bg-rose-600 active:bg-rose-700 text-white font-black text-xs rounded-xl shadow-md">💣 徹底毀滅所有主資料並還原預設</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 flex h-16 shadow-2xl z-50 max-w-md mx-auto">
        <button onclick="selTab('tally')" id="nav-tally" class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-0.5 nav-active">
            <span class="text-xl">📋</span>
            <span class="text-[10px] font-bold tracking-tight">現場對點</span>
        </button>
        <button onclick="selTab('load')" id="nav-load" class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-0.5">
            <span class="text-xl">🚛</span>
            <span class="text-[10px] font-bold tracking-tight">精細配載</span>
        </button>
        <button onclick="selTab('report')" id="nav-report" class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-0.5">
            <span class="text-xl">📊</span>
            <span class="text-[10px] font-bold tracking-tight">報表/遞延</span>
        </button>
        <button onclick="selTab('maintenance')" id="nav-maintenance" class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-0.5">
            <span class="text-xl">⚙️</span>
            <span class="text-[10px] font-bold tracking-tight">維護管理</span>
        </button>
    </nav>

    <div id="custom-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden border border-slate-100 animate-in fade-in zoom-in-95 duration-150">
            <div id="confirm-header-bg" class="p-4 bg-slate-900 text-white">
                <h3 id="confirm-title" class="font-black text-base tracking-tight">系統確認</h3>
            </div>
            <div class="p-4">
                <p id="confirm-msg" class="text-sm text-slate-600 font-medium leading-relaxed">確定執行此操作？</p>
                <div class="flex gap-2 mt-4">
                    <button id="confirm-cancel-btn" class="flex-1 py-2.5 bg-slate-100 active:bg-slate-200 text-slate-700 font-bold text-sm rounded-xl">取消</button>
                    <button id="confirm-ok-btn" class="flex-1 py-2.5 bg-blue-600 active:bg-blue-700 text-white font-black text-sm rounded-xl shadow-md">確定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心資料庫 (若 local 內無資料則載入系統初始資料)
        let db = {
            vendors: [
                { name: "(全區)卜蜂", items: [{name: "(吊)玫瑰鹽水煮蛋", pcs: 55}, {name: "晚-(吊)卜蜂義式香草雞胸肉", pcs: 50}, {name: "(吊)十三香烤雞翅", pcs: 55}, {name: "富錦樹-招牌蒼蠅頭飯", pcs: 16}] },
                { name: "(全區)元進莊", items: [{name: "晚-(吊)元進莊 藥膳熟雕蛋", pcs: 40}] },
                { name: "(北)松稜", items: [{name: "松稜-糖燻鴨翅", pcs: 25}] },
                { name: "(全)田尾-安昕農場", items: [{name: "晚-水果玉米棒", pcs: 30}] }
            ],
            trucks: [
                { name: "花超0586", max: 400, units: ["八堵"] },
                { name: "八堵集約車", max: 500, units: ["花蓮", "八堵"] },
                { name: "17噸", max: 500, units: ["八堵"] },
                { name: "新車次", max: 500, units: [] }
            ],
            tally: {},
            loads: {},
            tracks: {},
            okStatus: {}
        };

        const state = {
            curTab: 'tally',
            curZone: '全區大網格',
            curV: null,
            curP: null,
            calcBox: 0,
            calcRem: 0,
            calcOffset: 0,
            calcInput: "",
            calcMode: 'box',
            loadUnit: '全部展開',
            loadTruckIdx: null,
            repV: null,
            repUnit: '全部'
        };

        const UNITS = ["花蓮", "八堵", "五股", "鶯歌"];

        // 系統啟動初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadLocalData();
            refreshUI();
        });

        function loadLocalData() {
            const local = localStorage.getItem('LTS_TRANS_DB_7');
            if (local) {
                try { db = JSON.parse(local); } catch(e) { console.error("資料解析失敗", e); }
            }
        }

        function save() {
            localStorage.setItem('LTS_TRANS_DB_7', JSON.stringify(db));
            refreshUI();
            showSyncToast();
        }

        function showSyncToast() {
            const sb = document.getElementById('sync-status');
            sb.innerText = "⚡ 數據變更！已即時同步保存至雲端端點";
            setTimeout(() => { sb.innerText = "● LTS 雲端同步系統已就緒"; }, 2000);
        }

        // 核心自訂確認視窗
        function showCustomConfirm({ title, msg, isDanger, onConfirm }) {
            const modal = document.getElementById('custom-confirm-modal');
            const t = document.getElementById('confirm-title');
            const m = document.getElementById('confirm-msg');
            const h = document.getElementById('confirm-header-bg');
            const okBtn = document.getElementById('confirm-ok-btn');
            const cancelBtn = document.getElementById('confirm-cancel-btn');

            t.innerText = title || "系統確認";
            m.innerText = msg || "";
            if (isDanger) {
                h.className = "p-4 bg-rose-600 text-white";
                okBtn.className = "flex-1 py-2.5 bg-rose-600 active:bg-rose-700 text-white font-black text-sm rounded-xl shadow-md";
            } else {
                h.className = "p-4 bg-slate-900 text-white";
                okBtn.className = "flex-1 py-2.5 bg-blue-600 active:bg-blue-700 text-white font-black text-sm rounded-xl shadow-md";
            }

            modal.classList.remove('hidden');

            const cleanConfirm = okBtn.cloneNode(true);
            okBtn.parentNode.replaceChild(cleanConfirm, okBtn);

            cleanConfirm.addEventListener('click', () => {
                onConfirm();
                modal.classList.add('hidden');
            });
            cancelBtn.onclick = () => modal.classList.add('hidden');
        }

        // 分頁切換
        function selTab(t) {
            state.curTab = t;
            ['tally', 'load', 'report', 'maintenance'].forEach(tab => {
                document.getElementById(`tab-${tab}`).classList.add('hidden-tab');
                document.getElementById(`nav-${tab}`).classList.remove('nav-active');
            });
            document.getElementById(`tab-${t}`).classList.remove('hidden-tab');
            document.getElementById(`nav-${t}`).classList.add('nav-active');

            // 修正 2：當切換到報表分頁時，如果還沒有選定廠商，預設幫他選取第一個廠商，確保畫面穩定呈現
            if (t === 'report') {
                if (!state.repV && db.vendors.length > 0) {
                    state.repV = db.vendors[0].name;
                }
                if (!state.repUnit) {
                    state.repUnit = '全部';
                }
            }

            refreshUI();
        }

        // ==========================================================================
        // 核心 UI 渲染引擎
        // ==========================================================================
        function refreshUI() {
            document.getElementById('current-zone-badge').innerText = state.curZone;

            // 1. 現場對點區
            renderTallyVendorGrid();
            renderTallyVendorChips();
            renderTallyMainCard();

            // 2. 精細配載區
            renderLoadUnitChips();
            renderLoadTruckList();
            renderLoadMainPanel();

            // 3. 報表追蹤區
            renderReportVendorChips();
            renderReportUnitChips(); // 修正 2：確保單位選取隨時保持穩定渲染
            renderReportDetails();

            // 4. 維護管理區
            renderMaintenanceTrucks();
            renderMaintenanceVendors();
        }

        // --- 現場對點渲染 ---
        function renderTallyVendorGrid() {
            const grid = document.getElementById('tally-vendor-grid');
            grid.innerHTML = db.vendors.map((v, i) => {
                const isOk = db.okStatus[v.name] === true;
                return `
                    <button onclick="selVendor('${v.name}')" class="p-3 rounded-xl border text-left flex flex-col justify-between h-20 transition-all ${isOk ? 'bg-emerald-50 border-emerald-200 text-emerald-900' : 'bg-white border-slate-100 hover:border-slate-300'} shadow-sm">
                        <span class="text-xs font-black truncate w-full">${v.name}</span>
                        <div class="flex justify-between items-center w-full mt-1">
                            <span class="text-[10px] px-1.5 py-0.5 rounded font-bold ${isOk ? 'bg-emerald-200 text-emerald-800' : 'bg-slate-100 text-slate-500'}">${isOk ? '● 已確認' : '點收中'}</span>
                            <span class="text-xs font-black opacity-60">📦 ${v.items ? v.items.length : 0}</span>
                        </div>
                    </button>
                `;
            }).join('');
        }

        function renderTallyVendorChips() {
            const container = document.getElementById('tally-vendor-list');
            container.innerHTML = db.vendors.map(v => {
                const act = state.curV === v.name;
                return `
                    <button onclick="selVendor('${v.name}')" class="px-3 py-1.5 rounded-full text-xs font-extrabold whitespace-nowrap transition-all ${act ? 'bg-blue-600 text-white shadow' : 'bg-slate-100 text-slate-600 active:bg-slate-200'}">${v.name.replace(/\(.*\)/, '')}</button>
                `;
            }).join('');
        }

        function renderTallyMainCard() {
            const card = document.getElementById('tally-main-card');
            const grid = document.getElementById('tally-grid-card');

                ['box', 'rem', 'offset-plus', 'offset-minus'].forEach(m => {

                    } else {
                        btn.className = m === 'box' ? "h-14 text-sm font-bold rounded-xl bg-blue-50 text-blue-600 shadow-sm flex flex-col items-center justify-center" : (m === 'rem' ? "h-14 text-sm font-bold rounded-xl bg-gray-100 text-slate-700 shadow-sm flex flex-col items-center justify-center" : (m === 'offset-plus' ? "h-14 text-xs font-bold rounded-xl bg-rose-50 text-rose-600 shadow-sm flex flex-col items-center justify-center" : "h-14 text-xs font-bold rounded-xl bg-emerald-50 text-emerald-600 shadow-sm flex flex-col items-center justify-center"));
                    }
                });

        function closeTallyCard() { state.curV = null; state.curP = null; resetCalc(); refreshUI(); }
        function selVendor(n) { state.curV = n; state.curP = 0; resetCalc(); refreshUI(); }

        // 計算機輸入控制
        function pressNum(n) {
            state.calcInput += n.toString();
            updateCalcValFromInput();
        }
        function pressClear() { resetCalc(); refreshUI(); }
        function pressBackspace() {
            state.calcInput = state.calcInput.slice(0, -1);
            updateCalcValFromInput();
        }
        function pressOp(mode) { state.calcMode = mode; state.calcInput = ""; refreshUI(); }
        
        function updateCalcValFromInput() {
            const v = parseInt(state.calcInput) || 0;
            if (state.calcMode === 'box') state.calcBox = v;
            if (state.calcMode === 'rem') state.calcRem = v;
            if (state.calcMode === 'offset-plus') state.calcOffset = v;
            if (state.calcMode === 'offset-minus') state.calcOffset = -v;
            refreshUI();
        }
        function resetCalc() { state.calcBox = 0; state.calcRem = 0; state.calcOffset = 0; state.calcInput = ""; state.calcMode = 'box'; }

        function commitTally() {
            if (!state.curV) return;
            const vObj = db.vendors.find(v => v.name === state.curV);
            const curItem = vObj.items[state.curP];
            if (!curItem) return;

            const k = `${state.curV}_${curItem.name}`;
            if (!db.tally[k]) db.tally[k] = { box: 0, rem: 0, offset: 0 };

            db.tally[k].box += state.calcBox;
            db.tally[k].rem += state.calcRem;
            db.tally[k].offset += state.calcOffset;

            // 自動累加至未指派配載
            if (!db.loads[k]) db.loads[k] = {};
            const itemTotal = state.calcBox * curItem.pcs + state.calcRem + state.calcOffset;
            
            save();
            resetCalc();
            
            // 彈出高質感變色特效
            const bg = document.getElementById('checked-box-bg');
            bg.className = "bg-emerald-500 p-2.5 rounded-xl border border-emerald-600 text-white transition-none";
            setTimeout(() => { refreshUI(); }, 250);
        }

            const panel = document.getElementById('load-main-panel');

            panel.classList.remove('hidden');

            const truck = db.trucks[state.loadTruckIdx];
            document.getElementById('load-panel-title').innerText = `正在配載：${truck.name}`;
            document.getElementById('load-panel-subtitle').innerText = `目的地：${truck.units?.join(', ') || '全區'}`;

            const rowsContainer = document.getElementById('load-item-rows');
            let html = "";
            let panelTotal = 0;

            db.vendors.forEach(v => {
                if (!v.items || v.items.length === 0) return;
                let vHtml = "";

                v.items.forEach(it => {
                    const k = `${v.name}_${it.name}`;
                    
                    // 計算該品項總到貨量(箱)
                    const b = db.tally[k]?.box || 0;
                    const r = db.tally[k]?.rem || 0;
                    const o = db.tally[k]?.offset || 0;
                    const itemTotalCheckedPcs = b * it.pcs + r + o;
                    const totalCheckedBox = Math.floor(itemTotalCheckedPcs / it.pcs);

                    // 已分配給其他車的總箱數
                    let allocatedOther = 0;
                    db.trucks.forEach(tr => {
                        if (tr.name !== truck.name) allocatedOther += (db.loads[k]?.[tr.name] || 0);
                    });

                    const remainBox = Math.max(0, totalCheckedBox - allocatedOther);
                    const curAllocated = db.loads[k]?.[truck.name] || 0;
                    panelTotal += curAllocated;

                    if (totalCheckedBox > 0 || curAllocated > 0) {
                        vHtml += `
                            <div class="flex items-center justify-between py-2 border-b border-slate-50 text-xs">

                                </div>
                            </div>
                        `;
                    }

                if (vHtml) {
                    html += `

            document.getElementById('load-panel-total-box').innerText = `${panelTotal} 箱`;
        }

        function adjLoad(k, truckName, val) {
            if (!db.loads[k]) db.loads[k] = {};

        // ==========================================================================
        // 修正 1 的後端陣列上下移動交換演算法 (極致穩定且即時調序)
        // ==========================================================================
        function moveTruck(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= db.trucks.length) return; // 邊界防禦
            // 元素互換
            const temp = db.trucks[index];
            db.trucks[index] = db.trucks[targetIndex];
            db.trucks[targetIndex] = temp;
            save();
        }

        function moveVendor(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= db.vendors.length) return; // 邊界防禦
            const temp = db.vendors[index];
            db.vendors[index] = db.vendors[targetIndex];
            db.vendors[targetIndex] = temp;
            save();
        }

        function moveItem(vIndex, pIndex, direction) {
            const items = db.vendors[vIndex].items;
            const targetPIndex = pIndex + direction;
            if (targetPIndex < 0 || targetPIndex >= items.length) return; // 邊界防禦
            const temp = items[pIndex];
            items[pIndex] = items[targetPIndex];
            items[targetPIndex] = temp;
            save();
        }

        // ==========================================================================
        // 其餘維護操作核心業務邏輯 (完整保留，絕不改動)
        // ==========================================================================
        function addTruckPrompt() {
            const name = prompt("請輸入新轉運車次名稱 (例如: 八堵集約二車)：");
            if (!name) return;
            const max = parseInt(prompt("請輸入該車次最高裝載箱數上限：", "500")) || 500;
            db.trucks.push({ name, max, units: [] });
            save();
        }

        function delTruck(idx) {
            showCustomConfirm({
                title: "⚠️ 刪除車次確認",
                msg: `確定要永久刪除「${db.trucks[idx].name}」車次主資料嗎？這也會移除對應的配載快取！`,
                isDanger: true,
                onConfirm: () => { db.trucks.splice(idx, 1); save(); }
            });
        }

        function toggleTruckUnitPrompt(idx) {
            const t = db.trucks[idx];
            if (!t.units) t.units = [];
            const un = prompt(`請輸入要切換綁定的分流目的地名稱 (${UNITS.join('/')})：`);
            if (!un || !UNITS.includes(un)) { alert("輸入的目的地無效或不存在！"); return; }
            
            const pos = t.units.indexOf(un);
            if (pos > -1) t.units.splice(pos, 1);
            else t.units.push(un);
            save();
        }

        function addVendorPrompt() {
            const name = prompt("請輸入新合作廠商名稱 (例如: (全區)黑橋牌)：");
            if (!name) return;
            db.vendors.push({ name, items: [] });
            save();
        }

        function delVendor(idx) {
            showCustomConfirm({
                title: "⚠️ 刪除大廠確認",
                msg: `確定要刪除「${db.vendors[idx].name}」及其底下所有商品的對點與架構數據嗎？`,
                isDanger: true,
                onConfirm: () => { db.vendors.splice(idx, 1); save(); }
            });
        }

        function addItemPrompt(vIdx) {
            const name = prompt("請輸入新商品完整名稱：");
            if (!name) return;
            const pcs = parseInt(prompt("請輸入該商品標準大箱入數 (一箱幾入)：", "50")) || 50;
            if (!db.vendors[vIdx].items) db.vendors[vIdx].items = [];
            db.vendors[vIdx].items.push({ name, pcs });
            save();
        }

        function delItem(vIdx, pIdx) {
            db.vendors[vIdx].items.splice(pIdx, 1);
            save();
        }

        function clearAllTallyAndLoadAndTrackSet() {
            showCustomConfirm({
                title: "⚠️ 全台實時日結清空確認",
                msg: "這將會把「所有連線設備」今日的對點、配載、追蹤數據全部全面清除！(基礎車次與廠商主資料會保留)，確定執行嗎？",
                isDanger: true,
                onConfirm: () => { db.tally = {}; db.loads = {}; db.tracks = {}; db.okStatus = {}; save(); }
            });
        }

        function hardResetData() {
            showCustomConfirm({
                title: "💣 毀滅性重置系統確認",
                msg: "這將會把資料庫內的所有資料（包含客製的廠商、車次與商品主資料）全部連根拔起徹底抹除，並還原至原廠出廠狀態，確定執行嗎？",
                isDanger: true,
                onConfirm: () => { localStorage.removeItem('LTS_TRANS_DB_7'); location.reload(); }
            });
        }
    </script>
</body>
</html>
