<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTS 物流對點轉運系統 (全模組完美整合優化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; background-color: #eff6ff; }
        .hidden-tab { display: none; }
        .compact-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        .calc-btn { @apply h-14 text-xl font-bold rounded-xl bg-gray-100 active:bg-gray-300 flex items-center justify-center shadow-sm; }
        .zone-北 { border-left: 6px solid #3b82f6; } .zone-中 { border-left: 6px solid #10b981; } .zone-南 { border-left: 6px solid #f59e0b; }
        .unit-tag { @apply text-[10px] px-2 py-0.5 rounded-md font-bold; }
        .bg-unit-北 { background: #dbeafe; color: #1e40af; } .bg-unit-中 { background: #d1fae5; color: #065f46; } .bg-unit-南 { background: #ffedd5; color: #9a3412; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 select-none overflow-x-hidden">

    <div class="sticky top-0 z-50 shadow-sm">
        <div id="sync-status" class="bg-yellow-500 text-white text-[11px] text-center py-1 font-bold">
            雲端連線中...
        </div>
    </div>

    <main class="p-3 max-w-5xl mx-auto pb-32 mt-2">
        <section id="tab-check" class="space-y-3">
            <div class="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border">
                <button onclick="askDailyReset()" class="bg-red-50 text-red-600 border border-red-200 px-3 py-2 rounded-lg font-bold text-xs active:scale-95">全台實時日結</button>
                <div id="check-header" class="text-blue-600 font-black text-sm truncate">請點選下方廠商</div>
            </div>
            <div id="check-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="check-workspace" class="hidden space-y-3">
                <div class="flex gap-2 overflow-x-auto pb-1" id="check-unit-tabs"></div>
                <div id="check-items-container" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-loading" class="hidden-tab space-y-4">
            <div class="bg-white p-2 rounded-xl border shadow-sm space-y-2">
                <div class="text-[10px] text-slate-400 font-bold pl-1">第一步：請先選擇「目的地單位」來篩選對應車次</div>
                <div class="flex gap-2 overflow-x-auto pb-1" id="loading-unit-tabs"></div>
            </div>
            <div id="truck-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            
            <div id="load-selector" class="hidden fixed inset-0 bg-white z-[60] overflow-y-auto p-4">
                <div class="flex justify-between items-center border-b pb-3 mb-4 sticky top-0 bg-white z-10">
                    <div>
                        <h3 id="load-title" class="font-black text-lg text-blue-700">車次配載</h3>
                        <p class="text-[11px] text-slate-400">嚴格對點配額防呆系統</p>
                    </div>
                    <button onclick="closeLoad()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold shadow-md">儲存並關閉</button>
                </div>
                <div id="load-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="tab-report" class="hidden-tab space-y-4">
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button onclick="toggleRepMode('item')" id="btn-rep-item" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600">商品報表(欠補四格)</button>
                <button onclick="toggleRepMode('defer')" id="btn-rep-defer" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500">智能雙列遞延單</button>
            </div>
            <div id="rep-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="report-content" class="space-y-4"></div>
        </section>

        <section id="tab-manage" class="hidden-tab space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-blue-600 pl-2 mb-4 text-sm">車次設定</h2>
                <div id="m-trucks" class="space-y-3"></div>
                <button onclick="dbAdd('trucks')" class="w-full mt-3 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg text-xs font-bold">+ 新增車次</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-green-600 pl-2 mb-4 text-sm">廠商與品項分層</h2>
                <div id="m-vendors" class="space-y-4"></div>
                <button onclick="dbAdd('vendors')" class="w-full mt-3 py-2 border-2 border-dashed border-green-300 text-green-600 rounded-lg text-xs font-bold">+ 新增廠商</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-orange-500 pl-2 mb-4 text-sm">單位與分區設定</h2>
                <div id="m-units" class="space-y-2"></div>
                <button onclick="dbAdd('units')" class="w-full mt-3 py-2 border-2 border-dashed border-orange-300 text-orange-600 rounded-lg text-xs font-bold">+ 新增單位</button>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t shadow-lg">
        <nav class="max-w-5xl mx-auto flex justify-around items-center h-16">
            <button onclick="switchTab('check')" id="nav-check" class="flex-1 h-full text-xs font-bold text-slate-600">現場對點</button>
            <button onclick="switchTab('loading')" id="nav-loading" class="flex-1 h-full text-xs font-bold text-slate-600">精細配載</button>
            <button onclick="switchTab('report')" id="nav-report" class="flex-1 h-full text-xs font-bold text-slate-600">報表/遞延</button>
            <button onclick="switchTab('manage')" id="nav-manage" class="flex-1 h-full text-xs font-bold text-slate-600">維護管理</button>
        </nav>
    </div>

    <div id="calc-pop" class="fixed inset-0 bg-black/60 z-[100] hidden items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <span id="calc-label" class="font-black text-blue-600 text-lg">數量輸入</span>
                <button onclick="closeCalc()" class="text-slate-400 bg-slate-100 p-2 rounded-full">✕</button>
            </div>
            <div class="bg-slate-100 p-6 rounded-2xl text-right mb-6">
                <div id="calc-hist" class="text-slate-400 text-sm h-6 font-mono truncate"></div>
                <div id="calc-disp" class="text-5xl font-black text-slate-800 font-mono truncate">0</div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button class="calc-btn" onclick="cInput('7')">7</button><button class="calc-btn" onclick="cInput('8')">8</button><button class="calc-btn" onclick="cInput('9')">9</button><button class="calc-btn bg-orange-100 text-orange-600" onclick="cOp('+')">+</button>
                <button class="calc-btn" onclick="cInput('4')">4</button><button class="calc-btn" onclick="cInput('5')">5</button><button class="calc-btn" onclick="cInput('6')">6</button><button class="calc-btn bg-orange-100 text-orange-600 text-2xl" onclick="cOp('-')">-</button>
                <button class="calc-btn" onclick="cInput('1')">1</button><button class="calc-btn" onclick="cInput('2')">2</button><button class="calc-btn" onclick="cInput('3')">3</button><button class="calc-btn bg-blue-600 text-white row-span-2 text-2xl" onclick="cOk()">＝</button>
                <button class="calc-btn col-span-2" onclick="cInput('0')">0</button><button class="calc-btn bg-red-500 text-white font-black" onclick="cClear()">C</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const FIREBASE_DB_URL = "https://lts-system2-default-rtdb.firebaseio.com/"; 
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
        const dbRef = firebase.database().ref("LTS_SYSTEM_DATA");
        
        let db = { trucks: [], vendors: [], units: [], tally: {}, loads: {}, tracks: {}, okStatus: {} };
        const state = { tab: 'check', curV: null, curU: 'all', loadU: 'all', repMode: 'item', repV: null, calc: null, activeTruck: null };

        const save = () => {
            dbRef.set(db).then(() => { refreshUI(); });
        };

        dbRef.on('value', (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                db = cloudData;
                if(!db.tally) db.tally = {}; if(!db.loads) db.loads = {}; if(!db.tracks) db.tracks = {}; if(!db.okStatus) db.okStatus = {};
                document.getElementById('sync-status').innerText = "● 雲端即時同步中";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                refreshUI();
            }
        });

        // 核心運算
        function getFinalBox(vName, uName, pName) {
            const vendor = db.vendors.find(v => v.name === vName);
            const key = `${vName}_${uName}_${pName}`;
            const data = db.tally[key] || { box: 0, rem: 0, offset: 0, expected: 0, expectedBoxOnly: 0, expectedRem: 0 };
            
            let expStr = "";
            if (data.expected > 0) {
                if (data.expectedRem > 0) {
                    expStr = `${data.expectedBoxOnly || 0}箱${data.expectedRem}尾`;
                } else {
                    expStr = `${data.expected || 0}箱`;
                }
            }

            if (vendor && vendor.mode === 'sum') {
                return { display: `${data.box}箱`, hasReal: (data.box > 0 || data.offset !== 0), total: Math.max(0, (data.box || 0) + (data.offset || 0)), expected: data.expected || 0, expStr: data.expected ? `${data.expected}箱` : '' };
            }
            
            const carry = (data.rem || 0) > 0 ? 1 : 0;
            const hasReal = (data.box > 0 || data.rem > 0 || data.offset !== 0);
            const total = (data.box || 0) + carry + (data.offset || 0);
            return { display: `${data.box || 0}箱 ${data.rem || 0}尾`, hasReal: hasReal, total: Math.max(0, total), expected: data.expected || 0, expStr: expStr };
        }

        // 計算全台非目前車次已經分配掉的此貨物總箱數
        function getGlobalAllocated(tallyKey) {
            let total = 0;
            Object.keys(db.loads).forEach(tkName => {
                total += (db.loads[tkName]?.[tallyKey] || 0);
            });
            return total;
        }

        // 1. 現場對點 UI 渲染
        function renderCheck() {
            const vGrid = document.getElementById('check-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="selVendor('${v.name}')" class="p-2 rounded-xl border-2 text-[11px] font-black shadow-sm ${state.curV===v.name?'border-blue-600 bg-blue-50 text-blue-700':'bg-white border-transparent'}">
                    ${v.name}
                </button>
            `).join('');
            
            if (state.curV) {
                const vendor = db.vendors.find(v => v.name === state.curV);
                if(!vendor) return;
                document.getElementById('check-workspace').classList.remove('hidden');
                document.getElementById('check-header').innerText = `正在點收：${state.curV}`;
                
                document.getElementById('check-unit-tabs').innerHTML = `<button onclick="state.curU='all';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU==='all'?'bg-blue-600 text-white':'bg-white border'}">全部目的地</button>` +
                    db.units.map(u => `<button onclick="state.curU='${u.name}';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU===u.name?'bg-blue-600 text-white':'bg-white border'}">${u.name}</button>`).join('');
                
                const units = state.curU === 'all' ? db.units : db.units.filter(u => u.name === state.curU);
                document.getElementById('check-items-container').innerHTML = units.map(u => `
                    <div class="bg-white p-3 rounded-xl shadow-sm zone-${u.zone}">
                        <div class="flex justify-between items-center mb-2 border-b pb-1">
                            <span class="font-black text-xs">${u.name}</span>
                            <span class="unit-tag bg-unit-${u.zone}">${u.zone}區</span>
                        </div>
                        ${vendor.mode==='detail' ? (vendor.items||[]).map(p => {
                            const key = `${vendor.name}_${u.name}_${p.name}`;
                            const d = db.tally[key] || { box: 0, rem: 0, offset: 0 };
                            const stats = getFinalBox(vendor.name, u.name, p.name);
                            const isQtyMismatch = (stats.expected > 0) && (stats.total !== stats.expected);

                            return `
                                <div class="flex items-center gap-2 py-2 border-b last:border-0 ${isQtyMismatch ? 'bg-orange-50/80 px-1 rounded-lg' : ''}">
                                    <div class="flex-1 min-w-0">
                                        <div class="font-bold text-xs text-slate-800 truncate">${p.name}</div>
                                        ${stats.expStr ? `<span class="inline-block mt-0.5 text-[9px] font-black px-1 rounded bg-slate-100 text-slate-600">預計:${stats.expStr}</span>` : ''}
                                    </div>
                                    <div class="flex gap-1 items-center shrink-0">
                                        <div onclick="openCalc('${key}','box',${d.box||0},'${u.name}-${p.name}(整箱)')" class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center font-black text-xs">${d.box||0}</div>
                                        <div onclick="openCalc('${key}','rem',${d.rem||0},'${u.name}-${p.name}(尾數)')" class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center font-bold text-blue-600 text-xs">${d.rem||0}</div>
                                        <div class="flex flex-col gap-0.5 mx-0.5">
                                            <button onclick="adjOff('${key}',1)" class="w-7 h-4 bg-green-50 text-green-600 rounded text-[9px] font-bold">+1</button>
                                            <button onclick="adjOff('${key}',-1)" class="w-7 h-4 bg-red-50 text-red-600 rounded text-[9px] font-bold">-1</button>
                                        </div>
                                        <div class="w-8 text-center">
                                            <div class="text-xs font-black ${isQtyMismatch ? 'text-orange-600' : 'text-blue-700'}">${stats.total}</div>
                                            <div class="text-[8px] text-slate-300">總箱</div>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('') : (() => {
                            const key = `${vendor.name}_${u.name}_SUM`;
                            const d = db.tally[key] || { box: 0 };
                            const stats = getFinalBox(vendor.name, u.name, 'SUM');
                            return `
                            <div class="flex justify-between items-center p-1">
                                <span class="text-xs font-bold text-slate-600">總箱數點收 ${stats.expected > 0 ? `<span class="text-orange-600 text-[10px]">(預計:${stats.expected}箱)</span>`:''}</span>
                                <div onclick="openCalc('${key}','box',${d.box||0},'${u.name} 總箱')" class="w-16 h-9 bg-slate-100 rounded-lg flex items-center justify-center font-black text-sm">${d.box||0}</div>
                            </div>`;
                        })()}
                    </div>
                `).join('');
            }
        }

        // 2. 精細配載模組 (完美支援廠商群組全選與個別品項收合調整)
        function renderLoading() {
            const tabs = document.getElementById('loading-unit-tabs');
            tabs.innerHTML = `<button onclick="state.loadU='all';refreshUI()" class="px-4 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap ${state.loadU==='all'?'bg-blue-600 text-white shadow':'bg-slate-100 text-slate-600'}">顯示全部單位車次</button>` +
                db.units.map(u => `<button onclick="state.loadU='${u.name}';refreshUI()" class="px-4 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap ${state.loadU===u.name?'bg-blue-600 text-white shadow':'bg-slate-100 text-slate-600'}">${u.name}</button>`).join('');

            const targetTrucks = state.loadU === 'all' ? db.trucks : db.trucks.filter(t => (t.targets || []).includes(state.loadU));
            const grid = document.getElementById('truck-grid');
            
            if(targetTrucks.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-xs font-bold bg-white rounded-xl border">此單位目前沒有被指派任何轉運車次。</div>`;
                return;
            }

            grid.innerHTML = targetTrucks.map(t => {
                let loadedCount = 0;
                if(!db.loads[t.name]) db.loads[t.name] = {};
                Object.keys(db.loads[t.name]).forEach(k => {
                    loadedCount += (db.loads[t.name][k] || 0);
                });
                const pct = Math.min(100, Math.round((loadedCount / (t.max || 150)) * 100));
                
                return `
                    <div class="bg-white p-4 rounded-xl shadow-sm border">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-sm text-slate-800">🚚 ${t.name}</h3>
                            <span class="text-xs font-bold text-blue-600">${loadedCount} / ${t.max || 150} 箱</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-3">
                            <div class="bg-blue-600 h-full" style="width: ${pct}%"></div>
                        </div>
                        <div class="text-[10px] text-slate-400 font-bold truncate mb-3">已指派目的地: ${(t.targets || []).join(', ') || '未設定'}</div>
                        <button onclick="openLoad('${t.name}')" class="w-full py-2 bg-blue-50 hover:bg-blue-100 text-blue-600 font-black text-xs rounded-lg border border-blue-200 transition-colors">
                            進入配載此車貨物
                        </button>
                    </div>
                `;
            }).join('');
        }

        function openLoad(tn) {
            state.activeTruck = tn;
            const truck = db.trucks.find(x => x.name === tn) || { targets: [] };
            const fixedTargets = truck.targets || [];
            document.getElementById('load-selector').classList.remove('hidden');
            document.getElementById('load-title').innerText = `${tn} 配載任務分配`;
            if (!db.loads[tn]) db.loads[tn] = {};

            const tallyStructure = {};
            Object.keys(db.tally).forEach(key => {
                const parts = key.split('_');
                if (parts.length >= 2) {
                    const vName = parts[0]; const uName = parts[1]; const pName = parts[2] || 'SUM';
                    const totalBox = getFinalBox(vName, uName, pName).total;
                    if (totalBox > 0) {
                        if (!tallyStructure[uName]) tallyStructure[uName] = {};
                        if (!tallyStructure[uName][vName]) tallyStructure[uName][vName] = [];
                        tallyStructure[uName][vName].push({ pName, maxBox: totalBox, key });
                    }
                }
            });
            fixedTargets.forEach(tgt => { if (!tallyStructure[tgt]) tallyStructure[tgt] = {}; });
            const sortedUnits = Object.keys(tallyStructure).sort((a, b) => {
                const aFixed = fixedTargets.includes(a) ? 1 : 0;
                const bFixed = fixedTargets.includes(b) ? 1 : 0;
                return bFixed - aFixed;
            });

            let html = "";
            sortedUnits.forEach(tgt => {
                const uObj = db.units.find(u => u.name === tgt); const z = uObj?.zone || '北';
                const isConfiguredTarget = fixedTargets.includes(tgt);
                let headerAddon = isConfiguredTarget ? ' <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md ml-2 font-black">⭐ 固定指派路線</span>' : ' <span class="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-md ml-2 font-bold">非固定指派</span>';
                const headerBg = isConfiguredTarget ? 'bg-blue-50/70 border-blue-200' : 'bg-slate-100 border-slate-200';

                html += `<div class="${headerBg} p-2.5 rounded-lg font-black text-xs text-slate-700 mb-2 border-l-4 zone-${z} flex items-center shadow-sm">${tgt} 目的地 ${headerAddon}</div>`;
                const vendorsInUnit = tallyStructure[tgt];
                if (Object.keys(vendorsInUnit).length === 0) {
                    html += `<div class="text-[11px] text-slate-300 pl-4 py-2 mb-3 italic">該目的地目前尚無實到對點貨物資料</div>`;
                    return;
                }

                Object.keys(vendorsInUnit).forEach(vName => {
                    const cargoItems = vendorsInUnit[vName];
                    let vendorId = `v_${tn}_${tgt}_${vName}`.replace(/\s+/g, '');
                    
                    const isVendorAllChecked = cargoItems.every(item => {
                        const otherTruckAllocated = getGlobalAllocated(item.key) - (db.loads[tn][item.key] || 0);
                        const myMaxPossible = Math.max(0, item.maxBox - otherTruckAllocated);
                        return myMaxPossible > 0 && (db.loads[tn][item.key] || 0) === myMaxPossible;
                    });

                    // 🛠️ 預設加上 'hidden'，使廠商底下的商品清單初始為收合狀態
                    html += `
                        <div class="border rounded-xl bg-white shadow-sm p-3 mb-3">
                            <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg mb-2">
                                <label class="flex items-center font-black text-xs text-slate-800 cursor-pointer">
                                    <input type="checkbox" class="w-4 h-4 mr-2 rounded text-blue-600 focus:ring-0" ${isVendorAllChecked?'checked':''} onchange="toggleVendorGroupDirect('${tn}','${tgt}','${vName}', this.checked)">
                                    ${vName} <span class="text-[10px] text-gray-400 font-normal ml-1">(一鍵全選貨物)</span>
                                </label>
                                <button onclick="document.getElementById('${vendorId}').classList.toggle('hidden')" class="text-[10px] text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded font-bold transition-colors">展開/收合</button>
                            </div>
                            <div id="${vendorId}" class="hidden pl-1 space-y-2">`;

                    cargoItems.forEach(item => {
                        const otherTruckAllocated = getGlobalAllocated(item.key) - (db.loads[tn][item.key] || 0);
                        const myMaxPossible = Math.max(0, item.maxBox - otherTruckAllocated);
                        let currentAllocated = db.loads[tn][item.key] !== undefined ? db.loads[tn][item.key] : 0;
                        const isSoldOutByOthers = myMaxPossible <= 0 && currentAllocated === 0;

                        html += `
                            <div class="flex items-center justify-between py-2 border-b last:border-0 text-xs ${isSoldOutByOthers?'opacity-30':''}">
                                <label class="flex items-center flex-1 font-medium pr-2 cursor-pointer">
                                    <input type="checkbox" class="w-4 h-4 mr-2 text-blue-600 rounded focus:ring-0" ${currentAllocated > 0 ? 'checked' : ''} ${isSoldOutByOthers ? 'disabled' : ''} onchange="toggleItemSingle('${tn}','${item.key}', ${myMaxPossible}, this.checked)">
                                    <div class="min-w-0 flex-1">
                                        <span class="font-black text-slate-800 text-xs block truncate">${item.pName==='SUM'?'總箱點收商品':item.pName}</span>
                                        <span class="text-[10px] text-slate-500">實到: <strong class="text-slate-700">${item.maxBox}</strong> 箱 ${otherTruckAllocated > 0 ? `| 他車已分: <span class="text-orange-600">${otherTruckAllocated}</span> 箱` : ''}</span>
                                    </div>
                                </label>
                                <div class="flex items-center gap-1 shrink-0">
                                    <div class="flex flex-col items-end">
                                        <div class="flex items-center gap-1">
                                            <input type="number" min="0" max="${item.maxBox}" class="w-14 border border-blue-300 rounded-lg text-center p-1 font-black text-blue-600 text-sm focus:ring-2 focus:ring-blue-400" value="${currentAllocated}" ${isSoldOutByOthers ? 'disabled' : ''} oninput="updateAllocatedBoxes('${tn}','${item.key}',${item.maxBox},${otherTruckAllocated}, this.value, 'hint_${item.key}')">
                                            <span class="text-[11px] font-bold text-slate-400">箱</span>
                                        </div>
                                        <span id="hint_${item.key}" class="text-[9px] text-red-500 font-bold hidden">⚠️ 超出實到箱數</span>
                                    </div>
                                </div>
                            </div>`;
                    });
                    html += `</div></div>`;
                });
            });
            document.getElementById('load-list').innerHTML = html || "<div class='py-20 text-center text-slate-300 font-bold text-xs'>全台對點暫無任何到貨數據</div>";
        }

        // 精細配載：一鍵勾選廠商全品項
        function toggleVendorGroupDirect(tn, tgt, vName, isChecked) {
            Object.keys(db.tally).forEach(key => {
                if (key.startsWith(`${vName}_${tgt}_`)) {
                    const stats = getFinalBox(vName, tgt, key.split('_')[2] || 'SUM');
                    const otherTruckAllocated = getGlobalAllocated(key) - (db.loads[tn]?.[key] || 0);
                    const myMaxPossible = Math.max(0, stats.total - otherTruckAllocated);
                    if (!db.loads[tn]) db.loads[tn] = {};
                    db.loads[tn][key] = isChecked ? myMaxPossible : 0;
                }
            });
            openLoad(tn); 
        }

        // 精細配載：單選個別商品勾選狀態
        function toggleItemSingle(tn, key, maxPossible, isChecked) {
            if (!db.loads[tn]) db.loads[tn] = {};
            db.loads[tn][key] = isChecked ? maxPossible : 0;
            openLoad(tn);
        }

        // 精細配載：直接手動填入分配箱數
        function updateAllocatedBoxes(tn, key, maxBox, otherTruckAllocated, inputVal, hintId) {
            let val = parseInt(inputVal) || 0;
            const hintSpan = document.getElementById(hintId);
            const maxAllowed = maxBox - otherTruckAllocated;
            
            if (val > maxAllowed) {
                if(hintSpan) hintSpan.classList.remove('hidden');
                val = maxAllowed;
            } else {
                if(hintSpan) hintSpan.classList.add('hidden');
            }
            if (val < 0) val = 0;
            if (!db.loads[tn]) db.loads[tn] = {};
            db.loads[tn][key] = val;
        }

        function closeLoad() { document.getElementById('load-selector').classList.add('hidden'); save(); }

        // 3. 報表/遞延模組 (商品報表追蹤完全重構：第一格點擊強制負數，二三格補貨，四格精算並存庫存)
        function renderReport() {
            const vGrid = document.getElementById('rep-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="state.repV='${v.name}';renderReport()" class="p-2 rounded-lg border text-[10px] font-bold ${state.repV===v.name?'bg-blue-600 text-white shadow':'bg-white text-slate-500'}">
                    ${v.name}
                </button>
            `).join('');
            
            const content = document.getElementById('report-content');
            if (!state.repV) { content.innerHTML = "<div class='text-center py-12 text-slate-300 text-xs font-bold bg-white border rounded-xl'>請點選上方廠商載入報表數據</div>"; return; }

            const vendor = db.vendors.find(v => v.name === state.repV);
            if (!vendor) return;

            if (state.repMode === 'item') {
                // 🛠️ 報表明細優化分頁：四格欠補追蹤，第一格自動轉為負數，右側顯示現有總箱數
                let html = `<div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-600">
                                <h3 class="font-black text-xs text-blue-600 mb-3 flex justify-between items-center">
                                    <span>📋 ${state.repV} 現場欠貨與補貨狀況追蹤明細</span>
                                    <span class="text-[9px] text-slate-400 font-medium">第1格固定為欠貨(負數)</span>
                                </h3>`;

                db.units.forEach(u => {
                    let hasOutputUnitHeader = false;
                    Object.keys(db.tally).forEach(key => {
                        if (key.startsWith(`${vendor.name}_${u.name}_`)) {
                            const pName = key.split('_')[2] || 'SUM';
                            const stats = getFinalBox(vendor.name, u.name, pName);
                            
                            if (stats.total > 0 || stats.expected > 0) {
                                if (!hasOutputUnitHeader) {
                                    html += `<div class="border rounded-xl p-2 bg-slate-50 mb-3">
                                                <div class="font-black text-xs text-blue-800 mb-2">📍 目的地單位：${u.name}</div>`;
                                    hasOutputUnitHeader = true;
                                }

                                if (!db.tracks[key] || !Array.isArray(db.tracks[key])) {
                                    db.tracks[key] = [0, 0, 0, 0];
                                }
                                const t = db.tracks[key]; 
                                // 差額結算公式 = 欠貨(負數) + 補貨一(正) + 補貨二(正)
                                const currentDebtDiff = (t[0] || 0) + (t[1] || 0) + (t[2] || 0);

                                html += `
                                    <div class="bg-white p-2.5 rounded-lg border border-slate-200 mb-2 flex flex-col justify-between text-xs shadow-sm">
                                        <div class="flex justify-between items-center mb-2">
                                            <div class="min-w-0 flex-1">
                                                <span class="font-black text-slate-800 text-xs">${pName==='SUM'?'總箱點收品項':pName}</span>
                                            </div>
                                            <div class="shrink-0 text-right">
                                                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">現場有: ${stats.total} 箱</span>
                                            </div>
                                        </div>
                                        
                                        <div class="grid grid-cols-4 gap-1.5 text-center mt-1">
                                            <div onclick="openReportCalc('${key}', 0, '${u.name}-${pName} 欠貨登記')" class="p-1.5 bg-red-50 hover:bg-red-100 border border-red-100 rounded-lg cursor-pointer transition-colors">
                                                <div class="text-[9px] text-red-500 font-bold scale-90">1.欠貨數</div>
                                                <div class="text-xs font-black text-red-600">${t[0] || 0}</div>
                                            </div>
                                            <div onclick="openReportCalc('${key}', 1, '${u.name}-${pName} 第一次補貨')" class="p-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg cursor-pointer transition-colors">
                                                <div class="text-[9px] text-slate-500 font-bold scale-90">2.補貨(一)</div>
                                                <div class="text-xs font-black text-slate-700">+${t[1] || 0}</div>
                                            </div>
                                            <div onclick="openReportCalc('${key}', 2, '${u.name}-${pName} 第二次補貨')" class="p-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg cursor-pointer transition-colors">
                                                <div class="text-[9px] text-slate-500 font-bold scale-90">3.補貨(二)</div>
                                                <div class="text-xs font-black text-slate-700">+${t[2] || 0}</div>
                                            </div>
                                            <div class="p-1.5 ${currentDebtDiff < 0 ? 'bg-orange-50 border-orange-200' : 'bg-green-50 border-green-200'} border rounded-lg flex flex-col justify-center shadow-inner">
                                                <div class="text-[9px] ${currentDebtDiff < 0 ? 'text-orange-500' : 'text-green-500'} font-bold scale-90">差額狀態</div>
                                                <div class="text-xs font-black ${currentDebtDiff < 0 ? 'text-orange-600' : 'text-green-600'}">
                                                    ${currentDebtDiff < 0 ? `欠 ${Math.abs(currentDebtDiff)} 箱` : '已齊'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>`;
                            }
                        }
                    });
                    if (hasOutputUnitHeader) html += `</div>`;
                });
                html += `</div>`;
                content.innerHTML = html;
            } else {
                // 🛠️ 智能遞延單優化分頁：改成 grid-cols-2 佈局，一行完美呈現兩個站點單位，高度減半防滑屏
                let html = `<div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-500">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-black text-xs text-orange-600">📊 ${state.repV} 區域智能遞延單明細</h3>
                        <span class="text-[9px] bg-orange-100 text-orange-700 font-bold px-1.5 py-0.5 rounded">一行雙列版</span>
                    </div>`;
                
                html += `<div class="grid grid-cols-2 gap-2">`; // 🎯 關鍵雙列網格

                db.units.forEach(u => {
                    let unitTotalAllocated = 0;
                    let unitTotalTally = 0;

                    Object.keys(db.tally).forEach(key => {
                        if (key.startsWith(`${vendor.name}_${u.name}_`)) {
                            const pName = key.split('_')[2] || 'SUM';
                            unitTotalTally += getFinalBox(vendor.name, u.name, pName).total;
                            unitTotalAllocated += getGlobalAllocated(key);
                        }
                    });

                    const deferValue = unitTotalTally - unitTotalAllocated;
                    if (deferValue <= 0) return; // 該目的地完全載完時自動隱藏，節省介面空間

                    html += `
                        <div class="p-2 border border-orange-100 bg-orange-50/40 rounded-xl flex flex-col justify-between shadow-sm min-w-0">
                            <div class="flex justify-between items-center border-b border-orange-100 pb-1 mb-1">
                                <span class="font-black text-[11px] text-slate-700 truncate">${u.name}</span>
                                <span class="text-[8px] bg-orange-500 text-white font-black px-1 rounded transform scale-90 shrink-0">${u.zone}區</span>
                            </div>
                            <div class="flex justify-between items-end mt-0.5">
                                <span class="text-[9px] text-slate-400 font-medium shrink-0">未出/遞延</span>
                                <span class="text-sm font-black text-orange-600 truncate">
                                    ${deferValue} <span class="text-[9px] font-bold text-slate-400 font-normal">箱</span>
                                </span>
                            </div>
                        </div>`;
                });

                html += `</div></div>`;
                content.innerHTML = html;
            }
        }

        // 開啟報表欠補貨專用的數字輸入計算機
        window.openReportCalc = function(key, fieldIndex, label) {
            if (!db.tracks[key]) db.tracks[key] = [0, 0, 0, 0];
            const currentVal = db.tracks[key][fieldIndex];
            
            state.calc = { 
                key: "REP_TRACK_" + key, 
                field: fieldIndex, 
                label: label,
                isNew: true,
                runningTotal: 0,
                activeOp: null,
                hasClearedOnce: false
            };
            
            document.getElementById('calc-pop').classList.remove('hidden');
            document.getElementById('calc-pop').classList.add('flex');
            document.getElementById('calc-label').innerText = label;
            // 點開時顯示絕對值（正數）方便現場人員打數字
            document.getElementById('calc-disp').innerText = Math.abs(currentVal);
            document.getElementById('calc-hist').innerText = "";
        }

        // 4. 維護管理後台核心代碼
        function renderManage() {
            document.getElementById('m-trucks').innerHTML = (db.trucks || []).map((t, ti) => `
                <div class="bg-slate-50 p-3 rounded-xl border text-xs">
                    <div class="flex justify-between items-center mb-2">
                        <input type="text" class="font-black bg-transparent border-b border-slate-300 w-24 focus:bg-white" value="${t.name}" onchange="dbEdit('trucks',${ti},'name',this.value)">
                        <button onclick="dbDel('trucks',${ti})" class="text-red-500 font-bold">刪除</button>
                    </div>
                    <div class="flex items-center gap-1 mb-2">
                        <span class="text-[10px] text-slate-400">箱數上限:</span>
                        <input type="number" class="w-16 border rounded text-center bg-white font-bold" value="${t.max||150}" onchange="dbEdit('trucks',${ti},'max',parseInt(this.value)||150)">
                    </div>
                    <div class="text-[10px] text-slate-400 font-bold mb-1">負責指定單位:</div>
                    <div class="flex flex-wrap gap-1">
                        ${db.units.map(u => {
                            const isTgt = (t.targets || []).includes(u.name);
                            return `<button onclick="tglTgt(${ti},'${u.name}')" class="px-2 py-0.5 rounded text-[10px] border font-medium ${isTgt?'bg-blue-600 text-white border-blue-600':'bg-white text-slate-600'}" ${isTgt?'':'style="background-color: white;"'}>${u.name}</button>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('m-vendors').innerHTML = (db.vendors || []).map((v, vi) => `
                <div class="bg-slate-50 p-3 rounded-xl border text-xs space-y-2">
                    <div class="flex justify-between items-center">
                        <input type="text" class="font-black bg-transparent border-b border-slate-300 w-32 focus:bg-white" value="${v.name}" onchange="dbEdit('vendors',${vi},'name',this.value)">
                        <div class="flex gap-2">
                            <select onchange="dbEdit('vendors',${vi},'mode',this.value)" class="text-[10px] border rounded p-0.5 font-bold">
                                <option value="detail" ${v.mode==='detail'?'selected':''}>明細模式</option>
                                <option value="sum" ${v.mode==='sum'?'selected':''}>僅總箱</option>
                            </select>
                            <button onclick="dbDel('vendors',${vi})" class="text-red-500 font-bold">刪除</button>
                        </div>
                    </div>
                    ${v.mode === 'detail' ? `
                        <div class="bg-white p-2 rounded-lg border space-y-1">
                            <div class="text-[10px] text-slate-400 font-bold mb-1 flex justify-between"><span>商品清單與箱入數</span><button onclick="subA(${vi})" class="text-blue-600">+ 新增品項</button></div>
                            ${(v.items || []).map((p, pi) => `
                                <div class="flex gap-1 items-center mb-1">
                                    <input type="text" class="border rounded px-1 py-0.5 flex-1 font-medium text-[11px]" value="${p.name}" onchange="subE(${vi},${pi},'name',this.value)">
                                    <input type="number" class="border rounded px-1 py-0.5 w-12 text-center font-bold text-[11px]" value="${p.pcs}" onchange="subE(${vi},${pi},'pcs',parseInt(this.value)||10)">
                                    <span class="text-[10px] text-slate-300">入</span>
                                    <button onclick="subD(${vi},${pi})" class="text-slate-300 hover:text-red-500 px-1">✕</button>
                                </div>
                            `).join('')}
                        </div>
                    `:''}
                </div>
            `).join('');

            document.getElementById('m-units').innerHTML = (db.units || []).map((u, ui) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border text-xs">
                    <input type="text" class="font-bold bg-transparent border-b w-20" value="${u.name}" onchange="dbEdit('units',${ui},'name',this.value)">
                    <div class="flex gap-2 items-center">
                        <select onchange="dbEdit('units',${ui},'zone',this.value)" class="border rounded p-0.5 text-[10px] font-bold">
                            <option value="北" ${u.zone==='北'?'selected':''}>北區</option><option value="中" ${u.zone==='中'?'selected':''}>中區</option><option value="南" ${u.zone==='南'?'selected':''}>南區</option>
                        </select>
                        <select onchange="dbEdit('units',${ui},'type',this.value)" class="border rounded p-0.5 text-[10px] font-bold">
                            <option value="A" ${u.type==='A'?'selected':''}>遞延A</option><option value="B" ${u.type==='B'?'selected':''}>遞延B</option>
                        </select>
                        <button onclick="dbDel('units',${ui})" class="text-red-400 px-1">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function dbAdd(k) { if(k==='trucks') db.trucks.push({name:'新車次',max:150,targets:[]}); if(k==='vendors') db.vendors.push({name:'新廠商',mode:'detail',items:[]}); if(k==='units') db.units.push({name:'新單位',zone:'北',type:'A'}); save(); }
        function dbEdit(k,i,f,v) { db[k][i][f]=v; save(); }
        function dbDel(k,i) { if(confirm("確定刪除嗎？")) { db[k].splice(i,1); save(); } }
        function subA(vi) { if(!db.vendors[vi].items) db.vendors[vi].items=[]; db.vendors[vi].items.push({name:'新商品',pcs:10}); save(); }
        function subE(vi,pi,k,v) { db.vendors[vi].items[pi][k]=v; save(); }
        function subD(vi,pi) { if(confirm("確定刪除此品項？")) { db.vendors[vi].items.splice(pi,1); save(); } }
        function tglTgt(ti,un) { if(!db.trucks[ti].targets) db.trucks[ti].targets=[]; const idx=db.trucks[ti].targets.indexOf(un); if(idx>-1)db.trucks[ti].targets.splice(idx,1); else db.trucks[ti].targets.push(un); save(); }

        // 計算機核心邏輯
        function openCalc(k, t, v, l) { state.calc = { k, t, isNew: true, oldVal: v, runningTotal: 0, activeOp: null, hasClearedOnce: false }; document.getElementById('calc-label').innerText = l; document.getElementById('calc-disp').innerText = "0"; document.getElementById('calc-hist').innerText = ""; document.getElementById('calc-pop').classList.replace('hidden', 'flex'); }
        function cInput(n) { const d = document.getElementById('calc-disp'); if(state.calc.isNew){ d.innerText = n; state.calc.isNew = false; } else { d.innerText = d.innerText === '0' ? n : d.innerText + n; } }
        function cOp(op) { const d = document.getElementById('calc-disp'); const h = document.getElementById('calc-hist'); let cv = parseFloat(d.innerText) || 0; if (state.calc.activeOp === '+') state.calc.runningTotal += cv; else if (state.calc.activeOp === '-') state.calc.runningTotal -= cv; else state.calc.runningTotal = cv; state.calc.activeOp = op; state.calc.isNew = true; h.innerText = state.calc.runningTotal + " " + op; d.innerText = state.calc.runningTotal; }
        function cClear() { const d = document.getElementById('calc-disp'); if (d.innerText === '0' || state.calc.hasClearedOnce) { if(state.calc.key && state.calc.key.startsWith("REP_TRACK_")) { const rk = state.calc.key.replace("REP_TRACK_",""); if(db.tracks[rk]) db.tracks[rk][state.calc.field]=0; } else { if(!db.tally[state.calc.k]) db.tally[state.calc.k]={box:0,rem:0,offset:0}; db.tally[state.calc.k][state.calc.t]=0; } save(); closeCalc(); return; } d.innerText = '0'; state.calc.hasClearedOnce = true; }
        
        function cOk() {
            if(!state.calc) return;
            const d = document.getElementById('calc-disp');
            let iv = parseFloat(d.innerText) || 0;
            let res = state.calc.activeOp === '+' ? state.calc.runningTotal + iv : state.calc.activeOp === '-' ? state.calc.runningTotal - iv : iv;
            
            // 🎯 核心防呆：如果目前在「商品報表」的四格欠補貨欄位輸入
            if (state.calc.key && state.calc.key.startsWith("REP_TRACK_")) {
                const realKey = state.calc.key.replace("REP_TRACK_", ""); 
                const fieldIdx = parseInt(state.calc.field); 
                if (!db.tracks[realKey]) db.tracks[realKey] = [0, 0, 0, 0];

                if (fieldIdx === 0) {
                    // 第一格欠貨數：現場人員無論打正還是負，系統自動強制轉換為「固定負數」
                    db.tracks[realKey][0] = res === 0 ? 0 : -Math.abs(res);
                } else {
                    // 第二、三格補貨數：保持絕對值正數
                    db.tracks[realKey][fieldIdx] = Math.abs(res);
                }
                closeCalc();
                save();
                return;
            }

            // 正常現場對點箱尾數處理
            if(!db.tally[state.calc.k]) db.tally[state.calc.k]={box:0,rem:0,offset:0};
            db.tally[state.calc.k][state.calc.t]=Math.max(0, res);
            closeCalc();
            save();
        }
        
        function closeCalc() { document.getElementById('calc-pop').classList.replace('flex', 'hidden'); }

        function switchTab(t) { state.tab = t; document.querySelectorAll('section').forEach(s => s.classList.add('hidden-tab')); document.getElementById('tab-' + t).classList.remove('hidden-tab'); document.querySelectorAll('nav button').forEach(b => b.className="flex-1 h-full text-xs font-bold text-slate-400"); document.getElementById('nav-'+t).className="flex-1 h-full nav-active"; refreshUI(); }
        function toggleRepMode(m) { state.repMode = m; const a=document.getElementById('btn-rep-item'), b=document.getElementById('btn-rep-defer'); if(m==='item'){ a.className="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600"; b.className="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500"; }else{ b.className="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-orange-600"; a.className="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500"; } renderReport(); }
        function selVendor(n) { state.curV=n; refreshUI(); }
        function adjOff(k,v) { if(!db.tally[k])db.tally[k]={box:0,rem:0,offset:0}; db.tally[k].offset = (db.tally[k].offset||0)+v; save(); }
        function askDailyReset() { if(confirm("⚠️ 確定全面日結清空今日所有對點、配載、欠補追蹤數據嗎？")) { db.tally={}; db.loads={}; db.tracks={}; db.okStatus={}; save(); } }
        
        function refreshUI() { 
            if(state.tab==='check') renderCheck(); 
            if(state.tab==='loading') renderLoading(); 
            if(state.tab==='report') renderReport(); 
            if(state.tab==='manage') renderManage(); 
        }

        switchTab('check');
    </script>
</body>
</html>
