<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTS 物流對點轉運系統 (行政實時聯動防呆版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; background-color: #eff6ff; }
        .hidden-tab { display: none; }
        .compact-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        .calc-btn { @apply h-14 text-xl font-bold rounded-xl bg-gray-100 active:bg-gray-300 flex items-center justify-center shadow-sm; }
        .zone-北 { border-left: 6px solid #3b82f6; } .zone-中 { border-left: 6px solid #10b981; } .zone-南 { border-left: 6px solid #f59e0b; }
        .unit-tag { @apply text-[10px] px-2 py-0.5 rounded-md font-bold; }
        .bg-unit-北 { background: #dbeafe; color: #1e40af; } .bg-unit-中 { background: #d1fae5; color: #065f46; } .bg-unit-南 { background: #ffedd5; color: #9a3412; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 select-none overflow-x-hidden">

    <div class="sticky top-0 z-50 shadow-sm">
        <div id="sync-status" class="bg-yellow-500 text-white text-[11px] text-center py-1 font-bold">
            雲端連線中...
        </div>
    </div>

    <main class="p-3 max-w-5xl mx-auto pb-32 mt-2">
        <section id="tab-check" class="space-y-3">
            <div class="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border">
                <button onclick="askDailyReset()" class="bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-xs active:scale-95">日結清空</button>
                <div id="check-header" class="text-blue-600 font-black text-sm truncate">請先點選廠商卡片</div>
            </div>
            <div id="check-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="check-workspace" class="hidden space-y-3">
                <div class="flex gap-2 overflow-x-auto pb-1" id="check-unit-tabs"></div>
                <div id="check-items-container" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-loading" class="hidden-tab space-y-4">
            <div class="flex gap-2 overflow-x-auto pb-1 bg-white p-2 rounded-xl border shadow-sm" id="loading-unit-tabs"></div>
            <div id="truck-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            <div id="load-selector" class="hidden fixed inset-0 bg-white z-[60] overflow-y-auto p-4">
                <div class="flex justify-between items-center border-b pb-3 mb-4 sticky top-0 bg-white">
                    <div>
                        <h3 id="load-title" class="font-black text-lg text-blue-700">車次配載</h3>
                        <p class="text-[11px] text-slate-400">嚴格對點配額防呆系統</p>
                    </div>
                    <button onclick="closeLoad()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold shadow-md">儲存並關閉</button>
                </div>
                <div id="load-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="tab-report" class="hidden-tab space-y-4">
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button onclick="toggleRepMode('item')" id="btn-rep-item" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600">商品報表</button>
                <button onclick="toggleRepMode('defer')" id="btn-rep-defer" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500">智能預排遞延單</button>
            </div>
            <div id="rep-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="report-unit-filter-block" class="flex gap-2 overflow-x-auto pb-1"></div>
            <div id="report-content" class="space-y-4"></div>
        </section>

        <section id="tab-manage" class="hidden-tab space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-blue-600 pl-2 mb-4">車次設定</h2>
                <div id="m-trucks" class="space-y-3"></div>
                <button onclick="dbAdd('trucks')" class="w-full mt-3 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg text-xs font-bold">+ 新增車次</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-green-600 pl-2 mb-4">廠商與品項分層</h2>
                <div id="m-vendors" class="space-y-4"></div>
                <button onclick="dbAdd('vendors')" class="w-full mt-3 py-2 border-2 border-dashed border-green-300 text-green-600 rounded-lg text-xs font-bold">+ 新增廠商</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-orange-500 pl-2 mb-4">單位與分區設定</h2>
                <div id="m-units" class="space-y-2"></div>
                <button onclick="dbAdd('units')" class="w-full mt-3 py-2 border-2 border-dashed border-orange-300 text-orange-600 rounded-lg text-xs font-bold">+ 新增單位</button>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t shadow-lg">
        <nav class="max-w-5xl mx-auto">
            <div class="flex justify-around items-center h-16">
                <button onclick="switchTab('check')" id="nav-check" class="flex-1 h-full text-sm font-bold text-slate-600">現場對點</button>
                <button onclick="switchTab('loading')" id="nav-loading" class="flex-1 h-full text-sm font-bold text-slate-600">精細配載</button>
                <button onclick="switchTab('report')" id="nav-report" class="flex-1 h-full text-sm font-bold text-slate-600">報表/遞延</button>
                <button onclick="switchTab('manage')" id="nav-manage" class="flex-1 h-full text-sm font-bold text-slate-600">維護管理</button>
            </div>
        </nav>
    </div>

    <div id="custom-confirm-modal" class="fixed inset-0 bg-black/60 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl space-y-4 transform transition-all scale-95 opacity-0 duration-200" id="confirm-box">
            <div class="flex items-center gap-3">
                <div id="confirm-icon-bg" class="w-10 h-10 rounded-full flex items-center justify-center bg-red-100 text-red-600"><span>⚠️</span></div>
                <h3 id="confirm-title" class="font-black text-slate-800 text-base">系統確認</h3>
            </div>
            <p id="confirm-msg" class="text-xs text-slate-500 font-medium">您確定要執行此操作嗎？</p>
            <div class="flex gap-2 justify-end pt-2">
                <button id="confirm-btn-cancel" class="px-4 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl">取消</button>
                <button id="confirm-btn-action" class="px-5 py-2 bg-red-500 text-white text-xs font-bold rounded-xl shadow-sm">確定</button>
            </div>
        </div>
    </div>

    <div id="calc-pop" class="fixed inset-0 bg-black/60 z-[100] hidden items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex flex-col">
                    <span id="calc-label" class="font-black text-blue-600 text-lg">數量輸入</span>
                    <span class="text-[10px] text-slate-400">連按 [C] 可將數據直接歸零</span>
                </div>
                <button onclick="closeCalc()" class="text-slate-400 bg-slate-100 p-2 rounded-full">✕</button>
            </div>
            <div class="bg-slate-100 p-6 rounded-2xl text-right mb-6">
                <div id="calc-hist" class="text-slate-400 text-sm h-6 font-mono truncate"></div>
                <div id="calc-disp" class="text-5xl font-black text-slate-800 font-mono truncate">0</div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button class="calc-btn" onclick="cInput('7')">7</button>
                <button class="calc-btn" onclick="cInput('8')">8</button>
                <button class="calc-btn" onclick="cInput('9')">9</button>
                <button class="calc-btn bg-orange-100 text-orange-600" onclick="cOp('+')">+</button>
                <button class="calc-btn" onclick="cInput('4')">4</button>
                <button class="calc-btn" onclick="cInput('5')">5</button>
                <button class="calc-btn" onclick="cInput('6')">6</button>
                <button class="calc-btn bg-orange-100 text-orange-600 font-black text-2xl" onclick="cOp('-')">-</button>
                <button class="calc-btn" onclick="cInput('1')">1</button>
                <button class="calc-btn" onclick="cInput('2')">2</button>
                <button class="calc-btn" onclick="cInput('3')">3</button>
                <button class="calc-btn bg-blue-600 text-white row-span-2 text-2xl" onclick="cOk()">＝</button>
                <button class="calc-btn col-span-2" onclick="cInput('0')">0</button>
                <button class="calc-btn bg-red-500 text-white font-black" onclick="cClear()">C</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const FIREBASE_DB_URL = "https://lts-system2-default-rtdb.firebaseio.com/"; 
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
        const dbRef = firebase.database().ref("LTS_SYSTEM_DATA");
        
        let db = { trucks: [], vendors: [], units: [], tally: {}, loads: {}, tracks: {}, okStatus: {} };
        const state = { tab: 'check', curV: null, curU: 'all', loadU: 'all', repMode: 'item', repV: null, repU: 'all', calc: null, activeTruck: null };

        const save = () => {
            document.getElementById('sync-status').innerText = "雲端同步中...";
            document.getElementById('sync-status').className = "bg-blue-600 text-white text-[11px] text-center py-1 font-bold";
            dbRef.set(db).then(() => {
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                refreshUI();
            });
        };

        dbRef.on('value', (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                db = cloudData;
                if(!db.tally) db.tally = {};
                if(!db.loads) db.loads = {};
                if(!db.tracks) db.tracks = {};
                if(!db.okStatus) db.okStatus = {};
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                refreshUI();
            }
        });

        // 💡 核心演算：計算最終佔用總箱數（尾數 > 0 也要算一箱）
        function getFinalBox(vName, uName, pName) {
            const vendor = db.vendors.find(v => v.name === vName);
            const key = `${vName}_${uName}_${pName}`;
            const data = db.tally[key] || { box: 0, rem: 0, offset: 0, expected: 0, hasRealTally: false };
            
            if (vendor && vendor.mode === 'sum') {
                return { display: `${data.box}箱`, hasReal: (data.box > 0 || data.offset !== 0), total: Math.max(0, (data.box || 0) + (data.offset || 0)), expected: data.expected || 0 };
            }
            
            // 核心邏輯：尾數只要大於 0 就必須進位多裝一箱
            const carry = (data.rem || 0) > 0 ? 1 : 0;
            const hasReal = (data.box > 0 || data.rem > 0 || data.offset !== 0);
            const total = (data.box || 0) + carry + (data.offset || 0);
            return { display: `${data.box || 0}箱 ${data.rem || 0}尾`, hasReal: hasReal, total: Math.max(0, total), expected: data.expected || 0 };
        }

        // 現場對點 UI 渲染
        function renderCheck() {
            const vGrid = document.getElementById('check-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="selVendor('${v.name}')" class="p-2 rounded-xl border-2 text-[11px] font-black shadow-sm ${state.curV===v.name?'border-blue-600 bg-blue-50 text-blue-700':'bg-white border-transparent'}">
                    ${v.name}
                </button>
            `).join('');
            
            if (state.curV) {
                const vendor = db.vendors.find(v => v.name === state.curV);
                if(!vendor) return;
                document.getElementById('check-workspace').classList.remove('hidden');
                document.getElementById('check-header').innerText = `正在點收：${state.curV}`;
                
                document.getElementById('check-unit-tabs').innerHTML = `<button onclick="state.curU='all';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU==='all'?'bg-blue-600 text-white':'bg-white border'}">全部展開</button>` +
                    db.units.map(u => `<button onclick="state.curU='${u.name}';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU===u.name?'bg-blue-600 text-white':'bg-white border'}">${u.name}</button>`).join('');
                
                const units = state.curU === 'all' ? db.units : db.units.filter(u => u.name === state.curU);
                document.getElementById('check-items-container').innerHTML = units.map(u => `
                    <div class="bg-white p-3 rounded-xl shadow-sm zone-${u.zone}">
                        <div class="flex justify-between items-center mb-2 border-b pb-1">
                            <span class="font-black text-xs">${u.name}</span>
                            <span class="unit-tag bg-unit-${u.zone}">${u.zone}區</span>
                        </div>
                        ${vendor.mode==='detail' ? (vendor.items||[]).map(p => {
                            const key = `${vendor.name}_${u.name}_${p.name}`;
                            const d = db.tally[key] || { box: 0, rem: 0, offset: 0, expected: 0 };
                            const stats = getFinalBox(vendor.name, u.name, p.name);
                            
                            const isQtyMismatch = (stats.expected > 0) && (stats.total !== stats.expected);
                            const itemBgStyle = isQtyMismatch ? 'bg-orange-50/80 border border-orange-200 px-2 rounded-xl' : '';

                            return `
                                <div class="flex items-center gap-2 py-2 border-b last:border-0 ${itemBgStyle}">
                                    <div class="flex-1">
                                        <div class="font-bold text-xs text-slate-800 flex items-center flex-wrap gap-1">
                                            <span>${p.name}</span>
                                            ${stats.expected > 0 ? `<span class="ml-1 px-1 py-0.5 rounded text-[10px] font-bold ${isQtyMismatch ? 'bg-orange-200 text-orange-800' : 'bg-slate-100 text-slate-500'}">預計:${stats.expected}箱</span>` : ''}
                                        </div>
                                    </div>
                                    <div class="flex gap-1 items-center">
                                        <div onclick="openCalc('${key}','box',${d.box||0},'${u.name}-${p.name}(整箱)')" class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center font-black text-xs">${d.box||0}</div>
                                        <div onclick="openCalc('${key}','rem',${d.rem||0},'${u.name}-${p.name}(尾數)')" class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center font-bold text-blue-600 text-xs">${d.rem||0}</div>
                                        <div class="flex flex-col gap-1 mx-1">
                                            <button onclick="adjOff('${key}',1)" class="w-8 h-4 bg-green-50 text-green-600 rounded text-[10px] font-bold">+1</button>
                                            <button onclick="adjOff('${key}',-1)" class="w-8 h-4 bg-red-50 text-red-600 rounded text-[10px] font-bold">-1</button>
                                        </div>
                                        <div class="w-10 text-center">
                                            <div class="text-[11px] font-black ${isQtyMismatch ? 'text-orange-600 text-xs' : 'text-blue-700'}">${stats.total}</div>
                                            <div class="text-[8px] text-slate-300">總箱</div>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('') : (() => {
                            const key = `${vendor.name}_${u.name}_SUM`;
                            const d = db.tally[key] || { box: 0, rem: 0, offset: 0, expected: 0 };
                            const stats = getFinalBox(vendor.name, u.name, 'SUM');
                            const isQtyMismatch = (stats.expected > 0) && (stats.total !== stats.expected);
                            
                            return `
                            <div class="flex justify-between items-center p-2 rounded-xl ${isQtyMismatch ? 'bg-orange-50 border border-orange-200' : ''}">
                                <span class="text-xs font-bold text-slate-700">總箱數點收 ${stats.expected > 0 ? `<span class="text-orange-600">(預計:${stats.expected})</span>`:''}</span>
                                <div onclick="openCalc('${key}','box',${d.box||0},'${u.name} 總箱數')" class="w-20 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-black text-lg">${d.box||0}</div>
                            </div>`;
                        })()}
                    </div>
                `).join('');
            }
        }

        // 💡 智能動態遞延報表核心邏輯
        function renderReport() {
            const vGrid = document.getElementById('rep-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="state.repV='${v.name}';renderReport()" class="p-2 rounded-lg border text-[10px] font-bold ${state.repV===v.name?'bg-blue-600 text-white':'bg-white text-slate-500'}">
                    ${v.name}
                </button>
            `).join('');

            const content = document.getElementById('report-content');
            if (!state.repV) { content.innerHTML = "<div class='text-center py-12 text-slate-300'>請先點選上方廠商</div>"; return; }

            if (state.repMode === 'item') {
                // 明細與覆點畫面 (略過以精簡版面，與之前一致)
                content.innerHTML = "<div class='text-center py-4 text-slate-400 text-xs'>切換至下方「智能預排遞延單」可看預估與實到修正</div>";
            } else {
                // 💡 智能遞延：未點貨前先抓行政「預計箱數」，點貨後自動即時被現場「實點箱數」覆蓋修正！
                const getZoneTotal = (zoneType) => {
                    return db.units.filter(u => u.type === zoneType).reduce((sum, u) => {
                        return sum + calcUnitDynamicBoxes(state.repV, u.name);
                    }, 0);
                };

                content.innerHTML = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border-t-8 border-blue-600">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] text-slate-400 font-bold">遞延單 A (北區/中區)</span>
                            <span class="text-[9px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-bold">行政預排＋現場自動修正</span>
                        </div>
                        <div class="text-4xl font-black text-blue-600 my-2">${getZoneTotal('A')} <span class="text-sm">箱</span></div>
                        <div class="grid grid-cols-2 gap-2 mt-4">
                            ${db.units.filter(u => u.type === 'A').map(u => {
                                const isReal = checkHasRealTally(state.repV, u.name);
                                return `<div class="p-2 border rounded text-[10px] font-bold ${isReal?'bg-green-50/50 border-green-200':'bg-slate-50 border-dashed'}">${u.name}: <span class="text-blue-600">${calcUnitDynamicBoxes(state.repV, u.name)} 箱</span> ${isReal?'<span class="text-[8px] text-green-600 block">(現場實到修正)</span>':'<span class="text-[8px] text-slate-400 block">(行政預估值)</span>'}</div>`
                            }).join('')}
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-xl shadow-sm border-t-8 border-orange-500">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] text-slate-400 font-bold">遞延單 B (南區)</span>
                            <span class="text-[9px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded font-bold">行政預排＋現場自動修正</span>
                        </div>
                        <div class="text-4xl font-black text-orange-500 my-2">${getZoneTotal('B')} <span class="text-sm">箱</span></div>
                        <div class="grid grid-cols-2 gap-2 mt-4">
                            ${db.units.filter(u => u.type === 'B').map(u => {
                                const isReal = checkHasRealTally(state.repV, u.name);
                                return `<div class="p-2 border rounded text-[10px] font-bold ${isReal?'bg-green-50/50 border-green-200':'bg-slate-50 border-dashed'}">${u.name}: <span class="text-orange-500">${calcUnitDynamicBoxes(state.repV, u.name)} 箱</span> ${isReal?'<span class="text-[8px] text-green-600 block">(現場實到修正)</span>':'<span class="text-[8px] text-slate-400 block">(行政預估值)</span>'}</div>`
                            }).join('')}
                        </div>
                    </div>`;
            }
        }

        // 檢查現場是否有開始對點
        function checkHasRealTally(vName, uName) {
            const v = db.vendors.find(x => x.name === vName); if (!v) return false;
            const items = v.mode === 'detail' ? (v.items || []) : [{ name: 'SUM' }];
            return items.some(p => getFinalBox(vName, uName, p.name).hasReal);
        }

        // 動態判定：有實到用實到，沒實到用行政預計
        function calcUnitDynamicBoxes(vName, uName) {
            const v = db.vendors.find(x => x.name === vName); if (!v) return 0;
            const items = v.mode === 'detail' ? (v.items || []) : [{ name: 'SUM' }];
            
            let total = 0;
            items.forEach(p => {
                const stats = getFinalBox(vName, uName, p.name);
                if (stats.hasReal) {
                    total += stats.total; // 現場已經開始點了，用現場修正數量
                } else {
                    total += stats.expected; // 現場還沒點貨，預先撈取行政輸入的預計量
                }
            });
            return total;
        }

        // 下方為計算機核心操作與導覽，維持高流暢手感不變
        function openCalc(k, t, v, l) { state.calc = { k, t, isNew: true, oldVal: v, runningTotal: 0, activeOp: null, hasClearedOnce: false }; document.getElementById('calc-label').innerText = l; document.getElementById('calc-disp').innerText = "0"; document.getElementById('calc-hist').innerText = ""; document.getElementById('calc-pop').classList.replace('hidden', 'flex'); }
        function cInput(n) { const d = document.getElementById('calc-disp'); state.calc.hasClearedOnce = false; if(state.calc.isNew){ d.innerText = n; state.calc.isNew = false; } else { d.innerText = d.innerText === '0' ? n : d.innerText + n; } }
        function cOp(op) { const d = document.getElementById('calc-disp'); const h = document.getElementById('calc-hist'); let cv = parseFloat(d.innerText) || 0; if (state.calc.activeOp === '+') state.calc.runningTotal += cv; else if (state.calc.activeOp === '-') state.calc.runningTotal -= cv; else state.calc.runningTotal = cv; state.calc.activeOp = op; state.calc.isNew = true; h.innerText = state.calc.runningTotal + " " + op; d.innerText = state.calc.runningTotal; }
        function cClear() { const d = document.getElementById('calc-disp'); if (d.innerText === '0' || state.calc.hasClearedOnce) { showCustomConfirm({ title: "归零确认", msg: "确定清空数据？", onConfirm: () => { if(!db.tally[state.calc.k]) db.tally[state.calc.k]={box:0,rem:0,offset:0}; db.tally[state.calc.k][state.calc.t]=0; save(); closeCalc(); } }); return; } d.innerText = '0'; state.calc.hasClearedOnce = true; }
        function cOk() { const d = document.getElementById('calc-disp'); let iv = parseFloat(d.innerText) || 0; let res = state.calc.activeOp === '+' ? state.calc.runningTotal + iv : state.calc.activeOp === '-' ? state.calc.runningTotal - iv : (state.calc.oldVal > 0 ? iv + state.calc.oldVal : iv); if(!db.tally[state.calc.k]) db.tally[state.calc.k]={box:0,rem:0,offset:0}; db.tally[state.calc.k][state.calc.t]=Math.max(0, res); save(); closeCalc(); }
        function closeCalc() { document.getElementById('calc-pop').classList.replace('flex', 'hidden'); }
        function switchTab(t) { state.tab = t; document.querySelectorAll('section').forEach(s => s.classList.add('hidden-tab')); document.getElementById('tab-' + t).classList.remove('hidden-tab'); document.querySelectorAll('nav button').forEach(b => b.className="flex-1 h-full text-sm font-bold text-slate-400"); document.getElementById('nav-'+t).className="flex-1 h-full nav-active"; refreshUI(); }
        function toggleRepMode(m) { state.repMode = m; toggleRepModeUI(m); renderReport(); }
        function toggleRepModeUI(m) { const a=document.getElementById('btn-rep-item'), b=document.getElementById('btn-rep-defer'); if(m==='item'){ a.className="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600"; b.className="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500"; }else{ b.className="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-orange-600"; a.className="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500"; } }
        function refreshUI() { if(state.tab==='check')renderCheck(); if(state.tab==='report')renderReport(); }
        function selVendor(n) { state.curV=n; refreshUI(); }
        function adjOff(k,v) { if(!db.tally[k])db.tally[k]={box:0,rem:0,offset:0}; db.tally[k].offset = (db.tally[k].offset||0)+v; save(); }
        function askDailyReset() { showCustomConfirm({ title: "⚠️ 日結清空", msg: "確定清除今日所有對點數據嗎？", onConfirm: () => { db.tally={}; db.loads={}; db.tracks={}; db.okStatus={}; save(); } }); }
        function showCustomConfirm({ title, msg, onConfirm }) { const m=document.getElementById('custom-confirm-modal'), b=document.getElementById('confirm-box'); document.getElementById('confirm-title').innerText=title; document.getElementById('confirm-msg').innerText=msg; m.classList.replace('hidden','flex'); setTimeout(()=>{ b.classList.remove('scale-95','opacity-0'); },10); document.getElementById('confirm-btn-action').onclick=()=>{ onConfirm(); m.classList.replace('flex','hidden'); }; document.getElementById('confirm-btn-cancel').onclick=()=>{ m.classList.replace('flex','hidden'); }; }
        
        switchTab('check');
    </script>
</body>
</html>
