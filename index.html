<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTS 物流對點轉運系統 (實時免刷動態無閃版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; background-color: #eff6ff; }
        .compact-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        .calc-btn { @apply h-14 text-xl font-bold rounded-xl bg-gray-100 active:bg-gray-300 flex items-center justify-center shadow-sm; }
        .zone-北 { border-left: 6px solid #3b82f6; } .zone-中 { border-left: 6px solid #10b981; } .zone-南 { border-left: 6px solid #f59e0b; }
        .unit-tag { @apply text-[10px] px-2 py-0.5 rounded-md font-bold; }
        .bg-unit-北 { background: #dbeafe; color: #1e40af; } .bg-unit-中 { background: #d1fae5; color: #065f46; } .bg-unit-南 { background: #ffedd5; color: #9a3412; }
        
        /* 💡 新增：平滑滑動容器必備樣式，保持單一介面乾淨不穿幫 */
        .swipe-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .swipe-container::-webkit-scrollbar {
            display: none; /* 隱藏行動端滾動條 */
        }
        .swipe-section {
            flex: 0 0 100%;
            width: 100%;
            scroll-snap-align: start;
            height: calc(100vh - 4.5rem); /* 固定高度防止牽連滾動 */
            overflow-y: auto; /* 允許個別分頁獨立上下滾動 */
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 select-none overflow-x-hidden">

    <div class="sticky top-0 z-50 shadow-sm">
        <div id="sync-status" class="bg-yellow-500 text-white text-[11px] text-center py-1 font-bold">
            雲端連線中...
        </div>
        <nav class="bg-white border-b">
            <div class="flex justify-around items-center h-14 max-w-5xl mx-auto">
                <button onclick="switchTab('check')" id="nav-check" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">現場對點</button>
                <button onclick="switchTab('loading')" id="nav-loading" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">精細配載</button>
                <button onclick="switchTab('report')" id="nav-report" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">報表/遞延</button>
                <button onclick="switchTab('manage')" id="nav-manage" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">維護管理</button>
            </div>
        </nav>
    </div>

    <main id="main-swipe-container" class="swipe-container max-w-5xl mx-auto mt-2">
        
        <section id="tab-check" class="swipe-section p-3 space-y-3">
            <div class="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border">
                <button onclick="askDailyReset()" class="bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-xs active:scale-95">日結清空</button>
                <div id="check-header" class="text-blue-600 font-black text-sm truncate">請先點選廠商卡片</div>
            </div>
            <div id="check-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="check-workspace" class="hidden space-y-3">
                <div class="flex gap-2 overflow-x-auto pb-1" id="check-unit-tabs"></div>
                <div id="check-items-container" class="space-y-3"></div>
            </div>
            <div class="h-16"></div> </section>

        <section id="tab-loading" class="swipe-section p-3 space-y-4">
            <div class="flex gap-2 overflow-x-auto pb-1 bg-white p-2 rounded-xl border shadow-sm" id="loading-unit-tabs"></div>
            <div id="truck-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            <div id="load-selector" class="hidden fixed inset-0 bg-white z-[60] overflow-y-auto p-4">
                <div class="flex justify-between items-center border-b pb-3 mb-4 sticky top-0 bg-white">
                    <div>
                        <h3 id="load-title" class="font-black text-lg text-blue-700">車次配載</h3>
                        <p class="text-[11px] text-slate-400">嚴格對點配額防呆系統 ＆ 路線智能置頂排序</p>
                    </div>
                    <button onclick="closeLoad()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold shadow-md">儲存並關閉</button>
                </div>
                <div id="load-list" class="space-y-4"></div>
            </div>
            <div class="h-16"></div>
        </section>

        <section id="tab-report" class="swipe-section p-3 space-y-4">
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button onclick="toggleRepMode('item')" id="btn-rep-item" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600">商品報表</button>
                <button onclick="toggleRepMode('defer')" id="btn-rep-defer" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500">區域遞延單</button>
            </div>
            <div id="rep-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="report-unit-filter-block" class="hidden flex gap-2 overflow-x-auto pb-1"></div>
            <div id="report-content" class="space-y-4"></div>
            <div class="h-16"></div>
        </section>

        <section id="tab-manage" class="swipe-section p-3 space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-blue-600 pl-2 mb-4">車次設定</h2>
                <div id="m-trucks" class="space-y-3"></div>
                <button onclick="dbAdd('trucks')" class="w-full mt-3 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg text-xs font-bold">+ 新增車次</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-green-600 pl-2 mb-4">廠商與品項分層</h2>
                <div id="m-vendors" class="space-y-4"></div>
                <button onclick="dbAdd('vendors')" class="w-full mt-3 py-2 border-2 border-dashed border-green-300 text-green-600 rounded-lg text-xs font-bold">+ 新增廠商</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-orange-500 pl-2 mb-4">單位與分區設定</h2>
                <div id="m-units" class="space-y-2"></div>
                <button onclick="dbAdd('units')" class="w-full mt-3 py-2 border-2 border-dashed border-orange-300 text-orange-600 rounded-lg text-xs font-bold">+ 新增單位</button>
            </div>
            <div class="h-16"></div>
        </section>
    </main>

    <div id="custom-confirm-modal" class="fixed inset-0 bg-black/60 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl space-y-4 transform transition-all scale-95 opacity-0 duration-200" id="confirm-box">
            <div class="flex items-center gap-3">
                <div id="confirm-icon-bg" class="w-10 h-10 rounded-full flex items-center justify-center bg-red-100 text-red-600">
                    <span id="confirm-icon" class="text-xl font-bold">⚠️</span>
                </div>
                <h3 id="confirm-title" class="font-black text-slate-800 text-base">系統確認</h3>
            </div>
            <p id="confirm-msg" class="text-xs text-slate-500 leading-relaxed font-medium">您確定要執行此操作嗎？數據刪除後將無法還原。</p>
            <div class="flex gap-2 justify-end pt-2">
                <button id="confirm-btn-cancel" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-600 text-xs font-bold rounded-xl transition-all">取消</button>
                <button id="confirm-btn-action" class="px-5 py-2 bg-red-500 hover:bg-red-600 active:scale-95 text-white text-xs font-bold rounded-xl shadow-sm transition-all">確定刪除</button>
            </div>
        </div>
    </div>

    <div id="calc-pop" class="fixed inset-0 bg-black/60 z-[100] hidden items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex flex-col">
                    <span id="calc-label" class="font-black text-blue-600 text-lg">數量輸入</span>
                    <span class="text-[10px] text-slate-400">連按 [C] 可將對點數量直接歸零 | 支援減法 [-] 扣除</span>
                </div>
                <button onclick="closeCalc()" class="text-slate-400 bg-slate-100 p-2 rounded-full">✕</button>
            </div>
            <div class="bg-slate-100 p-6 rounded-2xl text-right mb-6">
                <div id="calc-hist" class="text-slate-400 text-sm h-6 font-mono truncate"></div>
                <div id="calc-disp" class="text-5xl font-black text-slate-800 font-mono truncate">0</div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button class="calc-btn" onclick="cInput('7')">7</button>
                <button class="calc-btn" onclick="cInput('8')">8</button>
                <button class="calc-btn" onclick="cInput('9')">9</button>
                <button class="calc-btn bg-orange-100 text-orange-600" onclick="cOp('+')">+</button>
                <button class="calc-btn" onclick="cInput('4')">4</button>
                <button class="calc-btn" onclick="cInput('5')">5</button>
                <button class="calc-btn" onclick="cInput('6')">6</button>
                <button class="calc-btn bg-orange-100 text-orange-600 font-black text-2xl" onclick="cOp('-')">-</button>
                <button class="calc-btn" onclick="cInput('1')">1</button> <button class="calc-btn" onclick="cInput('2')">2</button>
                <button class="calc-btn" onclick="cInput('3')">3</button>
                <button class="calc-btn bg-blue-600 text-white row-span-2 text-2xl" onclick="cOk()">＝</button>
                <button class="calc-btn col-span-2" onclick="cInput('0')">0</button>
                <button class="calc-btn bg-red-500 text-white font-black" onclick="cClear()">C</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const FIREBASE_DB_URL = "https://lts-system2-default-rtdb.firebaseio.com/"; 
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
        const dbRef = firebase.database().ref("LTS_SYSTEM_DATA");

        let db = { trucks: [], vendors: [], units: [], tally: {}, loads: {}, tracks: {}, okStatus: {} };
        const state = { tab: 'check', curV: null, curU: 'all', loadU: 'all', repMode: 'item', repV: null, repU: 'all', calc: null, activeTruck: null };
        
        // 💡 新增：鎖定旗標，避免點擊導覽與滑動監聽相互衝突
        let isProgrammaticScroll = false;
        const tabOrder = ['check', 'loading', 'report', 'manage'];

        const save = () => {
            document.getElementById('sync-status').innerText = "雲端同步中...";
            document.getElementById('sync-status').className = "bg-blue-600 text-white text-[11px] text-center py-1 font-bold";
            dbRef.set(db).then(() => {
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                refreshUI();
            }).catch(err => {
                document.getElementById('sync-status').innerText = "⚠️ 同步失敗，檢查網路";
                document.getElementById('sync-status').className = "bg-red-600 text-white text-[11px] text-center py-1 font-bold";
            });
        };

        dbRef.on('value', (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                let tempDb = cloudData;
                if(!tempDb.trucks) tempDb.trucks = [];
                if(!tempDb.vendors) tempDb.vendors = [];
                if(!tempDb.units) tempDb.units = [];
                if(!tempDb.tally) tempDb.tally = {};
                if(!tempDb.loads) tempDb.loads = {};
                if(!tempDb.tracks) tempDb.tracks = {};
                if(!tempDb.okStatus) tempDb.okStatus = {};
                for (let t in tempDb.loads) { if (Array.isArray(tempDb.loads[t])) { tempDb.loads[t] = {}; } }
                db = tempDb;
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                if(state.activeTruck && !document.getElementById('load-selector').classList.contains('hidden')){
                    openLoad(state.activeTruck);
                } else {
                    refreshUI();
                }
            } else {
                save();
            }
        });

        // 💡 修改：調整分頁切換邏輯。
        // 當點擊導覽按鈕或滑動觸發切換時，目標分頁必先強制置頂（scrollTop = 0），再將容器水平滑入。
        function switchTab(tabName) {
            state.tab = tabName;
            
            // 1. 更新導覽列高亮樣式
            tabOrder.forEach(t => {
                const navBtn = document.getElementById('nav-' + t);
                if (t === tabName) navBtn.classList.add('nav-active');
                else navBtn.classList.remove('nav-active');
            });

            // 2. 先將目標分頁內容重置回到最頂端
            const targetSec = document.getElementById('tab-' + tabName);
            if (targetSec) targetSec.scrollTop = 0;

            // 3. 進行水平滑動
            const container = document.getElementById('main-swipe-container');
            if (container && targetSec) {
                isProgrammaticScroll = true;
                container.scrollTo({
                    left: targetSec.offsetLeft,
                    behavior: 'smooth'
                });
                // 待滑動動畫結束後解鎖
                setTimeout(() => { isProgrammaticScroll = false; }, 350);
            }
        }

        // 💡 新增：手勢滑動監聽 IntersectionObserver 機制（確保單頁精確卡位且不滑過頭）
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('main-swipe-container');
            const sections = tabOrder.map(t => document.getElementById('tab-' + t));
            
            const observerOptions = {
                root: container,
                threshold: 0.5 // 當滑動過半(50%)時自動識別切換
            };

            const observer = new IntersectionObserver((entries) => {
                if (isProgrammaticScroll) return; // 點擊導覽引起的滾動則跳過，避免相互干擾
                
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const activeTabName = entry.target.id.replace('tab-', '');
                        state.tab = activeTabName;
                        
                        // 滑動到達新分頁時，將其立即置頂
                        entry.target.scrollTop = 0;

                        // 更新導覽列樣式
                        tabOrder.forEach(t => {
                            const navBtn = document.getElementById('nav-' + t);
                            if (t === activeTabName) navBtn.classList.add('nav-active');
                            else navBtn.classList.remove('nav-active');
                        });
                    }
                });
            }, observerOptions);

            sections.forEach(sec => { if (sec) observer.observe(sec); });
        });

        // 💡 修改：移除舊有的隱藏/顯示（hidden-tab）渲染限制，改為全渲染以便滑動
        function refreshUI() {
            renderCheck();
            renderLoading();
            renderReport();
            renderManage();
        }

        // 自訂防呆確認視窗邏輯
        function showCustomConfirm({ title, msg, isDanger, onConfirm }) {
            const modal = document.getElementById('custom-confirm-modal');
            const box = document.getElementById('confirm-box');
            const tEl = document.getElementById('confirm-title');
            const mEl = document.getElementById('confirm-msg');
            const btnAction = document.getElementById('confirm-btn-action');
            const btnCancel = document.getElementById('confirm-btn-cancel');
            const iconBg = document.getElementById('confirm-icon-bg');

            tEl.innerText = title; mEl.innerText = msg;
            if (isDanger) {
                iconBg.className = "w-10 h-10 rounded-full flex items-center justify-center bg-red-100 text-red-600";
                btnAction.className = "px-5 py-2 bg-red-500 hover:bg-red-600 active:scale-95 text-white text-xs font-bold rounded-xl shadow-sm transition-all";
                btnAction.innerText = "確定刪除";
            } else {
                iconBg.className = "w-10 h-10 rounded-full flex items-center justify-center bg-blue-100 text-blue-600";
                btnAction.className = "px-5 py-2 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white text-xs font-bold rounded-xl shadow-sm transition-all";
                btnAction.innerText = "確定執行";
            }

            modal.classList.replace('hidden', 'flex');
            setTimeout(() => { box.classList.remove('scale-95', 'opacity-0'); box.classList.add('scale-100', 'opacity-100'); }, 10);
            const closeBox = () => { box.classList.remove('scale-100', 'opacity-100'); box.classList.add('scale-95', 'opacity-0'); setTimeout(() => { modal.classList.replace('flex', 'hidden'); }, 180); };
            btnAction.onclick = () => { onConfirm(); closeBox(); };
            btnCancel.onclick = () => { closeBox(); };
        }

        function getFinalBox(vName, uName, pName) {
            const vendor = db.vendors.find(v => v.name === vName);
            const key = `${vName}_${uName}_${pName}`;
            const data = db.tally[key] || { box: 0, rem: 0, offset: 0 };
            if (vendor && vendor.mode === 'sum') {
                return { display: `${data.box}箱`, rawBox: data.box || 0, rawRem: 0, offset: data.offset || 0, total: Math.max(0, (data.box || 0) + (data.offset || 0)) };
            }
            const carry = (data.rem || 0) > 0 ? 1 : 0;
            const total = (data.box || 0) + carry + (data.offset || 0);
            return { display: `${data.box || 0}箱 ${data.rem || 0}尾`, rawBox: data.box || 0, rawRem: data.rem || 0, offset: data.offset || 0, total: Math.max(0, total) };
        }

        function getGlobalAllocated(key) {
            let total = 0; for (let tName in db.loads) { total += (db.loads[tName][key] || 0); } return total;
        }

        function renderCheck() {
            const vGrid = document.getElementById('check-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="selVendor('${v.name}')" class="p-2 rounded-xl border-2 text-[11px] font-black shadow-sm ${state.curV===v.name?'border-blue-600 bg-blue-50 text-blue-700':'bg-white border-transparent'}">
                    ${v.name}
                </button>
            `).join('');
            if (state.curV) {
                const vendor = db.vendors.find(v => v.name === state.curV);
                if(!vendor) { state.curV = null; document.getElementById('check-workspace').classList.add('hidden'); return; }
                document.getElementById('check-workspace').classList.remove('hidden');
                document.getElementById('check-header').innerText = `正在點收：${state.curV}`;
                document.getElementById('check-unit-tabs').innerHTML = `<button onclick="state.curU='all';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU==='all'?'bg-blue-600 text-white':'bg-white border'}">全部展開</button>` +
                    db.units.map(u => `<button onclick="state.curU='${u.name}';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU===u.name?'bg-blue-600 text-white':'bg-white border'}">${u.name}</button>`).join('');
                const units = state.curU === 'all' ? db.units : db.units.filter(u => u.name === state.curU);
                document.getElementById('check-items-container').innerHTML = units.map(u => `
                    <div class="bg-white p-3 rounded-xl shadow-sm zone-${u.zone}">
                        <div class="flex justify-between items-center mb-2 border-b pb-1">
                            <span class="font-black text-xs">${u.name}</span>
                            <span class="unit-tag bg-unit-${u.zone}">${u.zone}區 / 單${u.type}</span>
                        </div>
                        ${vendor.mode==='detail' ? (vendor.items||[]).map(p => {
                            const key = `${vendor.name}_${u.name}_${p.name}`;
                            const d = db.tally[key] || { box: 0, rem: 0, offset: 0 };
                            const stats = getFinalBox(vendor.name, u.name, p.name);
                            return `
                                <div class="flex items-center gap-2 py-2 border-b last:border-0">
                                    <div class="flex-1"><div class="font-bold text-xs">${p.name}</div><div class="text-[9px] text-slate-400">箱入:${p.pcs}</div></div>
                                    <div class="flex gap-1 items-center">
                                        <div onclick="openCalc('${key}','box',${d.box||0},'${u.name} - ${p.name}(箱)')" class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center font-black text-xs">${d.box||0}</div>
                                        <div onclick="openCalc('${key}','rem',${d.rem||0},'${u.name} - ${p.name}(尾)')" class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center font-bold text-blue-600 text-xs">${d.rem||0}</div>
                                        <div class="flex flex-col gap-1 mx-1">
                                            <button onclick="adjOff('${key}',1)" class="w-8 h-4 bg-green-50 text-green-600 rounded text-[10px] font-bold">+1</button>
                                            <button onclick="adjOff('${key}',-1)" class="w-8 h-4 bg-red-50 text-red-600 rounded text-[10px] font-bold">-1</button>
                                        </div>
                                        <div class="w-10 text-center">
                                            <div class="text-[10px] font-black text-blue-700">${stats.total}</div>
                                            <div class="text-[8px] text-slate-300">總箱</div>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('') : `
                            <div class="flex justify-between items-center p-2">
                                <span class="text-xs font-bold text-slate-400">總箱數點收</span>
                                <div onclick="openCalc('${vendor.name}_${u.name}_SUM','box',${(db.tally[`${vendor.name}_${u.name}_SUM`]||{box:0}).box||0},'${u.name} 總箱數')" class="w-20 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-black text-lg">${(db.tally[`${vendor.name}_${u.name}_SUM`]||{box:0}).box||0}</div>
                            </div>`}
                    </div>
                `).join('');
            } else {
                document.getElementById('check-workspace').classList.add('hidden');
                document.getElementById('check-header').innerText = `請先點選廠商卡片`;
            }
        }

        function renderLoading() {
            document.getElementById('loading-unit-tabs').innerHTML = `
                <button onclick="state.loadU='all';renderLoading()" class="px-4 py-1.5 rounded-full text-xs font-black whitespace-nowrap ${state.loadU==='all'?'bg-blue-600 text-white':'bg-slate-100 border text-slate-600'}">全部展開</button>
            ` + db.units.map(u => `
                <button onclick="state.loadU='${u.name}';renderLoading()" class="px-4 py-1.5 rounded-full text-xs font-black whitespace-nowrap ${state.loadU===u.name?'bg-blue-600 text-white':'bg-slate-100 border text-slate-600'}">${u.name}</button>
            `).join('');
            let processedTrucks = [...db.trucks];
            if (state.loadU !== 'all') { processedTrucks = processedTrucks.filter(t => t.targets && t.targets.includes(state.loadU)); }
            processedTrucks.sort((a, b) => { const tA = (a.targets || []).sort().join(','); const tB = (b.targets || []).sort().join(','); return tA.localeCompare(tB); });
            const grid = document.getElementById('truck-grid');
            if (processedTrucks.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-300 font-bold text-xs">目前沒有符合該目的地的車次</div>`;
                return;
            }

            grid.innerHTML = processedTrucks.map(t => {
                const loadedObj = db.loads[t.name] || {};
                let currentLoad = 0; Object.keys(loadedObj).forEach(k => { currentLoad += (loadedObj[k] || 0); });
                const routeBadgesHtml = (t.targets || []).map(tgt => `<span class="text-[10px] bg-blue-100 text-blue-700 border border-blue-200 px-2 py-0.5 rounded-md font-black shadow-sm">📍 ${tgt}</span>`).join(' ');
                
                let summaryHtml = Object.keys(loadedObj).map(k => {
                    const boxAllocated = loadedObj[k] || 0; if (boxAllocated <= 0) return '';
                    const [vn, un, pn] = k.split('_'); const z = db.units.find(u=>u.name===un)?.zone || '北';
                    return `<div class="flex justify-between bg-unit-${z} p-1 mb-1 rounded text-[9px] font-bold"><span>${un} | ${vn} - ${pn==='SUM'?'總箱':pn}</span><span>${boxAllocated}箱</span></div>`;
                }).join('');

                return `
                    <div onclick="openLoad('${t.name}')" class="bg-white p-4 rounded-xl shadow-sm border-l-8 border-blue-600 active:bg-slate-50 transition-all">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="font-black text-sm text-slate-800 block">${t.name}</span>
                                <div class="flex flex-wrap gap-1 mt-1.5">${routeBadgesHtml || '<span class="text-[10px] text-slate-300 italic">未設定路線</span>'}</div>
                            </div>
                            <div class="text-right shrink-0"><span class="text-xs font-black ${currentLoad>t.limit?'text-red-500':'text-blue-600'}">${currentLoad} / ${t.limit} 箱</span></div>
                        </div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full mb-3 mt-2"><div class="bg-blue-600 h-full rounded-full" style="width:${Math.min(currentLoad/t.limit*100,100)}%"></div></div>
                        <div class="space-y-1">${summaryHtml || '<div class="text-[10px] text-slate-300 text-center py-2">待載入貨物...</div>'}</div>
                    </div>`;
            }).join('');
        }

        function openLoad(tn) {
            state.activeTruck = tn;
            const truck = db.trucks.find(x => x.name === tn) || { targets: [] };
            const fixedTargets = truck.targets || [];
            document.getElementById('load-selector').classList.remove('hidden');
            document.getElementById('load-title').innerText = `${tn} 配載`;
            if (!db.loads[tn]) db.loads[tn] = {};

            const tallyStructure = {};
            Object.keys(db.tally).forEach(key => {
                const parts = key.split('_');
                if (parts.length >= 2) {
                    const vName = parts[0]; const uName = parts[1]; const pName = parts[2] || 'SUM';
                    const totalBox = getFinalBox(vName, uName, pName).total;
                    if (totalBox > 0) {
                        if (!tallyStructure[uName]) tallyStructure[uName] = {};
                        if (!tallyStructure[uName][vName]) tallyStructure[uName][vName] = [];
                        tallyStructure[uName][vName].push({ pName, maxBox: totalBox, key });
                    }
                }
            });
            fixedTargets.forEach(tgt => { if (!tallyStructure[tgt]) tallyStructure[tgt] = {}; });
            const sortedUnits = Object.keys(tallyStructure).sort((a, b) => {
                const aFixed = fixedTargets.includes(a) ? 1 : 0; const bFixed = fixedTargets.includes(b) ? 1 : 0; return bFixed - aFixed;
            });
            let html = "";
            sortedUnits.forEach(tgt => {
                const uObj = db.units.find(u => u.name === tgt); const z = uObj?.zone || '北';
                const isConfiguredTarget = fixedTargets.includes(tgt);
                let headerAddon = isConfiguredTarget ? ' <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md ml-2 font-black">⭐ 固定車次路線</span>' : ' <span class="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-md ml-2 font-bold">非固定車次路線</span>';
                const headerBg = isConfiguredTarget ? 'bg-blue-50/70 border-blue-200' : 'bg-slate-100 border-slate-200';

                html += `<div class="${headerBg} p-2.5 rounded-lg font-black text-xs text-slate-700 mb-2 border-l-4 zone-${z} flex items-center shadow-sm">${tgt} 目的地 ${headerAddon}</div>`;
                const vendorsInUnit = tallyStructure[tgt];
                if (Object.keys(vendorsInUnit).length === 0) {
                    html += `<div class="text-[11px] text-slate-300 pl-4 py-2 mb-3 italic">該固定單位目前尚無對點貨物資料</div>`; return;
                }

                Object.keys(vendorsInUnit).forEach(vName => {
                    const cargoItems = vendorsInUnit[vName]; let vendorId = `v_${tn}_${tgt}_${vName}`.replace(/\s+/g, '');
                    const isVendorAllChecked = cargoItems.every(item => {
                        const globalAllocatedWithoutMe = getGlobalAllocated(item.key) - (db.loads[tn][item.key] || 0);
                        const myMaxPossible = item.maxBox - globalAllocatedWithoutMe; return myMaxPossible > 0 && (db.loads[tn][item.key] || 0) === myMaxPossible;
                    });

                    html += `
                        <div class="border rounded-xl bg-white shadow-sm p-3 mb-3">
                            <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg mb-2">
                                <label class="flex items-center font-black text-xs text-slate-800">
                                    <input type="checkbox" class="w-4 h-4 mr-2 rounded text-blue-600" ${isVendorAllChecked?'checked':''} onchange="toggleVendorGroupDirect('${tn}','${tgt}','${vName}', this.checked)">
                                    ${vName}
                                </label>
                                <button onclick="document.getElementById('${vendorId}').classList.toggle('hidden')" class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded font-bold">展開/收合</button>
                            </div>
                            <div id="${vendorId}" class="pl-1 space-y-2">`;
                    cargoItems.forEach(item => {
                        const globalAllocatedWithoutMe = getGlobalAllocated(item.key) - (db.loads[tn][item.key] || 0);
                        const myMaxPossible = Math.max(0, item.maxBox - globalAllocatedWithoutMe);
                        let currentAllocated = db.loads[tn][item.key] !== undefined ? db.loads[tn][item.key] : 0;
                        const isSoldOutByOthers = myMaxPossible <= 0 && currentAllocated === 0;
                        html += `
                            <div class="flex items-center justify-between py-2 border-b last:border-0 text-xs ${isSoldOutByOthers?'opacity-30':''}">
                                <label class="flex items-center flex-1 font-medium pr-2">
                                    <input type="checkbox" class="w-4 h-4 mr-2 text-blue-600" ${currentAllocated > 0 ? 'checked' : ''} ${isSoldOutByOthers ? 'disabled' : ''} onchange="toggleItemSingle('${tn}','${item.key}', ${myMaxPossible}, this.checked)">
                                    <div class="truncate">
                                        <span class="font-black text-slate-800 text-xs block truncate">${item.pName=='SUM'?'總箱點收':item.pName}</span>
                                        <span class="text-[10px] text-slate-500">對點數: <strong class="text-slate-700">${item.maxBox}</strong> 箱 ${globalAllocatedWithoutMe > 0 ? `| 他車已分: <span class="text-orange-600">${globalAllocatedWithoutMe}</span> 箱` : ''}</span>
                                    </div>
                                </label>
                                <div class="flex items-center gap-1 shrink-0">
                                    <div class="flex flex-col items-end">
                                        <div class="flex items-center gap-1">
                                            <input type="number" min="0" max="${item.maxBox}" class="w-14 border rounded-lg text-center p-1.5 font-black text-blue-600 text-sm focus:ring-2 focus:ring-blue-400" value="${currentAllocated}" ${isSoldOutByOthers ? 'disabled' : ''} oninput="updateAllocatedBoxes('${tn}','${item.key}',${item.maxBox},${globalAllocatedWithoutMe}, this.value, 'hint_${item.key}')">
                                            <span class="text-[11px] font-bold text-slate-400">箱</span>
                                        </div>
                                        <span id="hint_${item.key}" class="text-[9px] text-red-500 font-bold hidden">⚠️ 超過對點總數</span>
                                    </div>
                                </div>
                            </div>`;
                    }); html += `</div></div>`;
                });
            }); document.getElementById('load-list').innerHTML = html || "<div class='py-20 text-center text-slate-300'>此車次與全台對點暫無任何貨物數據</div>";
        }

        function toggleVendorGroupDirect(tn, tgt, vName, isChecked) {
            Object.keys(db.tally).forEach(key => { if (key.startsWith(`${vName}_${tgt}_`)) { const maxBox = getFinalBox(vName, tgt, key.split('_')[2]||'SUM').total; const globalAllocatedWithoutMe = getGlobalAllocated(key) - (db.loads[tn][key] || 0); const myMaxPossible = Math.max(0, maxBox - globalAllocatedWithoutMe); if (maxBox > 0) { db.loads[tn][key] = isChecked ? myMaxPossible : 0; } } }); dbRef.set(db);
        }
        function toggleItemSingle(tn, key, myMaxPossible, isChecked) { db.loads[tn][key] = isChecked ? myMaxPossible : 0; dbRef.set(db); }
        function updateAllocatedBoxes(tn, key, maxBox, otherAllocated, value, hintId) { let val = parseInt(value) || 0; const hintSpan = document.getElementById(hintId); const absoluteMaxAllowed = maxBox - otherAllocated; if (val < 0) val = 0; if (val > absoluteMaxAllowed) { val = absoluteMaxAllowed; if(hintSpan) { hintSpan.classList.remove('hidden'); setTimeout(() => hintSpan.classList.add('hidden'), 2000); } } else { if(hintSpan) hintSpan.classList.add('hidden'); } db.loads[tn][key] = val; dbRef.set(db); }
        
        function toggleRepMode(m) {
            state.repMode = m; const btnItem = document.getElementById('btn-rep-item'); const btnDefer = document.getElementById('btn-rep-defer');
            if (m === 'item') { btnItem.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600"; btnDefer.className = "flex-1 py-2 rounded-lg font-bold text-sm text-slate-500"; document.getElementById('report-unit-filter-block').classList.remove('hidden'); }
            else { btnDefer.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-orange-600"; btnItem.className = "flex-1 py-2 rounded-lg font-bold text-sm text-slate-500"; document.getElementById('report-unit-filter-block').classList.add('hidden'); } renderReport();
        }

        function renderReport() {
            const vGrid = document.getElementById('rep-vendor-grid'); vGrid.innerHTML = db.vendors.map(v => ` <button onclick="state.repV='${v.name}';renderReport()" class="p-2 rounded-lg border text-[10px] font-bold ${state.repV===v.name?'bg-blue-600 text-white':'bg-white text-slate-500'}"> ${v.name} </button> `).join('');
            const uFilterBlock = document.getElementById('report-unit-filter-block'); if (state.repMode === 'item') { uFilterBlock.innerHTML = `<button onclick="state.repU='all';renderReport()" class="px-3 py-1 rounded-full text-[10px] font-bold whitespace-nowrap ${state.repU==='all'?'bg-slate-800 text-white':'bg-white border'}">全部單位</button>` + db.units.map(u => `<button onclick="state.repU='${u.name}';renderReport()" class="px-3 py-1 rounded-full text-[10px] font-bold whitespace-nowrap ${state.repU===u.name?'bg-slate-800 text-white':'bg-white border'}">${u.name}</button>`).join(''); }
            const content = document.getElementById('report-content'); if (!state.repV) { content.innerHTML = "<div class='text-center py-12 text-slate-300'>請先點選廠商</div>"; return; }
            const vendor = db.vendors.find(v => v.name === state.repV); if(!vendor) return;

            if (state.repMode === 'item') {
                const units = state.repU === 'all' ? db.units : db.units.filter(u => u.name === state.repU);
                let html = "";
                units.forEach(u => {
                    let hasCargo = false; let pRows = "";
                    if (vendor.mode === 'detail') {
                        (vendor.items || []).forEach(p => {
                            const stats = getFinalBox(vendor.name, u.name, p.name);
                            if (stats.total > 0) { hasCargo = true; pRows += `<div class="flex justify-between text-xs py-1 border-b last:border-0"><span>${p.name}</span><span class="font-bold text-blue-600">${stats.display}</span></div>`; }
                        });
                    } else {
                        const stats = getFinalBox(vendor.name, u.name, 'SUM');
                        if (stats.total > 0) { hasCargo = true; pRows = `<div class="flex justify-between text-xs py-1"><span>總箱數點收</span><span class="font-bold text-blue-600">${stats.display}</span></div>`; }
                    }
                    if (hasCargo) { html += `<div class="bg-white p-3 rounded-xl border border-l-4 zone-${u.zone} shadow-sm"><h4 class="font-black text-xs text-slate-700 mb-2">${u.name}</h4><div class="divide-y divide-slate-100">${pRows}</div></div>`; }
                }); content.innerHTML = html || `<div class="text-center py-12 text-slate-300 font-bold text-xs">「${state.repV}」目前尚無任何對點數據</div>`;
            } else {
                let trackingHtml = "";
                db.units.forEach(u => {
                    let key = `${vendor.name}_${u.name}_SUM`;
                    if(vendor.mode==='detail' && vendor.items && vendor.items[0]){ key = `${vendor.name}_${u.name}_${vendor.items[0].name}`; }
                    const maxBox = getFinalBox(vendor.name, u.name, key.split('_')[2]).total;
                    if(maxBox <= 0) return;
                    if(!db.tracks[key]) db.tracks[key] = [0,0,0,0];
                    const arr = db.tracks[key]; const isOk = db.okStatus[key] || false;
                    trackingHtml += `
                        <div class="bg-white p-3 rounded-xl border shadow-sm flex flex-col gap-2">
                            <div class="flex justify-between items-center border-b pb-1">
                                <span class="font-black text-xs text-slate-800">${u.name} (總對點 ${maxBox} 箱)</span>
                                <button onclick="tglOk('${key}')" class="px-3 py-1 rounded-md text-[10px] font-bold ${isOk?'bg-green-500 text-white':'bg-slate-100 text-slate-400'}">${isOk?'● 已齊全':'未完結'}</button>
                            </div>
                            <div class="grid grid-cols-4 gap-2 text-center">
                                <div class="bg-slate-50 p-1.5 rounded-lg"><div class="text-[9px] text-slate-400 font-bold">缺品/少到</div><input type="number" step="any" class="w-full bg-transparent text-center font-bold text-red-500 text-xs mt-0.5" value="${arr[0]||''}" placeholder="0" oninput="updTrk('${key}',0,this.value, true)"></div>
                                <div class="bg-slate-50 p-1.5 rounded-lg"><div class="text-[9px] text-slate-400 font-bold">破損/異狀</div><input type="number" step="any" class="w-full bg-transparent text-center font-bold text-orange-500 text-xs mt-0.5" value="${arr[1]||''}" placeholder="0" oninput="updTrk('${key}',1,this.value, true)"></div>
                                <div class="bg-slate-50 p-1.5 rounded-lg"><div class="text-[9px] text-slate-400 font-bold">留倉/未發</div><input type="number" step="any" class="w-full bg-transparent text-center font-bold text-blue-500 text-xs mt-0.5" value="${arr[2]||''}" placeholder="0" oninput="updTrk('${key}',2,this.value, true)"></div>
                                <div class="bg-slate-50 p-1.5 rounded-lg"><div class="text-[9px] text-slate-400 font-bold">遞延出貨</div><input type="number" step="any" class="w-full bg-transparent text-center font-bold text-purple-600 text-xs mt-0.5" value="${arr[3]||''}" placeholder="0" oninput="updTrk('${key}',3,this.value)"></div>
                            </div>
                        </div>`;
                }); content.innerHTML = trackingHtml || `<div class="text-center py-12 text-slate-300 font-bold text-xs">「${state.repV}」目前暫無相關貨物追蹤指標</div>`;
            }
        }

        function tglOk(k) { if(!db.okStatus)db.okStatus={}; db.okStatus[k]=!db.okStatus[k]; save(); }
        function updTrk(k, i, v, forceNegative=false) { if (!db.tracks[k]) db.tracks[k] = [0, 0, 0, 0]; let num = parseFloat(v) || 0; if (forceNegative && num > 0) { num = -num; } db.tracks[k][i] = num; save(); }

        function renderManage() {
            let tHtml = db.trucks.map((t, idx) => `
                <div class="border p-3 rounded-xl bg-slate-50 space-y-2">
                    <div class="flex gap-2">
                        <input type="text" class="flex-1 border p-1.5 rounded-lg text-xs font-bold" value="${t.name}" onchange="dbE('trucks',${idx},'name',this.value)" placeholder="車次名稱">
                        <input type="number" class="w-20 border p-1.5 rounded-lg text-xs font-bold text-center" value="${t.limit}" onchange="dbE('trucks',${idx},'limit',parseInt(this.value)||0)" placeholder="上限箱">
                        <button onclick="dbDel('trucks',${idx})" class="text-red-500 text-xs px-1 font-bold">刪除</button>
                    </div>
                    <div class="flex flex-wrap gap-1.5 pt-1">
                        ${db.units.map(u => {
                            const isTgt = t.targets && t.targets.includes(u.name);
                            return `<button onclick="tglTgt(${idx},'${u.name}')" class="px-2 py-1 rounded text-[10px] font-black border transition-all ${isTgt?'bg-blue-600 text-white border-blue-600':'bg-white text-slate-500 border-slate-200'}">${u.name}</button>`;
                        }).join('')}
                    </div>
                </div>`).join('');
            document.getElementById('m-trucks').innerHTML = tHtml || "<div class='text-slate-300 text-xs text-center py-4'>無車次資料</div>";

            let vHtml = db.vendors.map((v, idx) => `
                <div class="border p-3 rounded-xl bg-slate-50 space-y-3">
                    <div class="flex gap-2 items-center">
                        <input type="text" class="flex-1 border p-1.5 rounded-lg text-xs font-bold" value="${v.name}" onchange="dbE('vendors',${idx},'name',this.value)" placeholder="廠商名稱">
                        <select class="border p-1.5 rounded-lg text-xs font-bold bg-white" onchange="dbE('vendors',${idx},'mode',this.value)">
                            <option value="detail" ${v.mode==='detail'?'selected':''}>精細品項</option>
                            <option value="sum" ${v.mode==='sum'?'selected':''}>純總箱數</option>
                        </select>
                        <button onclick="dbDel('vendors',${idx})" class="text-red-500 text-xs px-1 font-bold">刪除</button>
                    </div>
                    ${v.mode==='detail' ? `
                    <div class="pl-3 border-l-2 border-green-300 space-y-2">
                        <div id="m-items-${idx}" class="space-y-1.5">
                            ${(v.items||[]).map((p, pIdx) => `
                                <div class="flex gap-2">
                                    <input type="text" class="flex-1 border p-1 rounded text-xs font-medium" value="${p.name}" onchange="subE(${idx},${pIdx},'name',this.value)" placeholder="品項名稱">
                                    <input type="number" class="w-16 border p-1 rounded text-xs font-medium text-center" value="${p.pcs}" onchange="subE(${idx},${pIdx},'pcs',parseInt(this.value)||1)" placeholder="箱入數">
                                    <button onclick="db.vendors[${idx}].items.splice(${pIdx},1);save()" class="text-slate-400 text-xs">✕</button>
                                </div>`).join('')}
                        </div>
                        <button onclick="subA(${idx})" class="text-[11px] text-green-600 font-bold">+ 新增品項</button>
                    </div>` : ''}
                </div>`).join('');
            document.getElementById('m-vendors').innerHTML = vHtml || "<div class='text-slate-300 text-xs text-center py-4'>無廠商資料</div>";

            let uHtml = db.units.map((u, idx) => `
                <div class="flex gap-2 items-center border p-2 rounded-xl bg-slate-50">
                    <input type="text" class="flex-1 border p-1.5 rounded-lg text-xs font-bold" value="${u.name}" onchange="dbE('units',${idx},'name',this.value)" placeholder="單位名稱">
                    <select class="border p-1.5 rounded-lg text-xs font-bold bg-white" onchange="dbE('units',${idx},'zone',this.value)">
                        <option value="北" ${u.zone==='北'?'selected':''}>北區</option>
                        <option value="中" ${u.zone==='中'?'selected':''}>中區</option>
                        <option value="南" ${u.zone==='南'?'selected':''}>南區</option>
                    </select>
                    <select class="border p-1.5 rounded-lg text-xs font-bold bg-white" onchange="dbE('units',${idx},'type',this.value)">
                        <option value="單" ${u.type==='單'?'selected':''}>單</option>
                        <option value="雙" ${u.type==='雙'?'selected':''}>雙</option>
                    </select>
                    <button onclick="dbDel('units',${idx})" class="text-red-500 text-xs px-1 font-bold">刪除</button>
                </div>`).join('');
            document.getElementById('m-units').innerHTML = uHtml || "<div class='text-slate-300 text-xs text-center py-4'>無單位資料</div>";
        }

        function subA(vi) { if(!db.vendors[vi].items) db.vendors[vi].items=[]; db.vendors[vi].items.push({name:'新商品',pcs:10}); save(); }
        function subE(vi,pi,k,v) { db.vendors[vi].items[pi][k]=v; save(); }
        function tglTgt(ti,un) { if(!db.trucks[ti].targets) db.trucks[ti].targets=[]; const idx=db.trucks[ti].targets.indexOf(un); if(idx>-1)db.trucks[ti].targets.splice(idx,1); else db.trucks[ti].targets.push(un); save(); }
        function selVendor(n) { state.curV=n; refreshUI(); }
        function adjOff(k,v) { if(!db.tally[k])db.tally[k]={box:0,rem:0,offset:0}; let nextOffset = (db.tally[k].offset||0) + v; db.tally[k].offset = nextOffset; save(); }

        function dbAdd(type) {
            if(type==='trucks') db.trucks.push({name:'新車次',limit:300,targets:[]});
            if(type==='vendors') db.vendors.push({name:'新廠商',mode:'detail',items:[]});
            if(type==='units') db.units.push({name:'新單位',zone:'北',type:'單'});
            save();
        }
        function dbE(type, idx, k, v) { db[type][idx][k] = v; save(); }
        function dbDel(type, idx) {
            let label = type==='trucks'?'車次':(type==='vendors'?'廠商':'單位');
            showCustomConfirm({
                title: `⚠️ 刪除${label}確認`,
                msg: `您確定要永久刪除此${label}設定嗎？相關對點配載資料也會受影響。`,
                isDanger: true,
                onConfirm: () => { db[type].splice(idx, 1); save(); }
            });
        }

        function askDailyReset() {
            showCustomConfirm({
                title: "⚠️ 全台實時日結清空確認",
                msg: "這將會把「所有連線設備」今日的對點、配載、追蹤數據全部全面清除！(基礎車次與廠商主資料會保留)，確定執行嗎？",
                isDanger: true,
                onConfirm: () => { db.tally={}; db.loads={}; db.tracks={}; db.okStatus={}; save(); }
            });
        }

        // 計算小鍵盤邏輯保持不變
        function openCalc(key, field, currentVal, titleText) {
            state.calc = { key, field, baseVal: currentVal, inputStr: '', op: null, leftVal: null };
            document.getElementById('calc-label').innerText = titleText;
            document.getElementById('calc-hist').innerText = `目前數據: ${currentVal}`;
            document.getElementById('calc-disp').innerText = '0';
            document.getElementById('calc-pop').classList.replace('hidden', 'flex');
        }
        function closeCalc() { document.getElementById('calc-pop').classList.replace('flex', 'hidden'); state.calc = null; }
        let cClearClickCount = 0; let cClearTimer = null;
        function cClear() {
            cClearClickCount++;
            if (cClearClickCount === 2) {
                clearTimeout(cClearTimer); cClearClickCount = 0;
                if (state.calc) {
                    const k = state.calc.key; if(!db.tally[k]) db.tally[k]={box:0,rem:0,offset:0};
                    db.tally[k][state.calc.field] = 0; db.tally[k].offset = 0; closeCalc(); save(); return;
                }
            }
            cClearTimer = setTimeout(() => { cClearClickCount = 0; }, 500);
            if (!state.calc) return; state.calc.inputStr = ''; state.calc.op = null; state.calc.leftVal = null;
            document.getElementById('calc-disp').innerText = '0';
        }
        function cInput(num) { if (!state.calc) return; if (state.calc.inputStr === '0') state.calc.inputStr = ''; state.calc.inputStr += num; document.getElementById('calc-disp').innerText = state.calc.inputStr; }
        function cOp(operator) {
            if (!state.calc) return; let currentIn = parseInt(state.calc.inputStr) || 0;
            if (state.calc.leftVal === null) { state.calc.leftVal = state.calc.inputStr !== '' ? currentIn : state.calc.baseVal; }
            else if (state.calc.op && state.calc.inputStr !== '') {
                if (state.calc.op === '+') state.calc.leftVal += currentIn;
                else if (state.calc.op === '-') state.calc.leftVal -= currentIn;
            }
            state.calc.op = operator; state.calc.inputStr = '';
            document.getElementById('calc-hist').innerText = `${state.calc.leftVal} ${operator}`;
            document.getElementById('calc-disp').innerText = '0';
        }
        function cOk() {
            if (!state.calc) return; let currentIn = parseInt(state.calc.inputStr) || 0; let finalVal = 0;
            if (state.calc.op && state.calc.leftVal !== null) {
                if (state.calc.op === '+') finalVal = state.calc.leftVal + currentIn;
                else if (state.calc.op === '-') finalVal = state.calc.leftVal - currentIn;
            } else { finalVal = state.calc.inputStr !== '' ? currentIn : state.calc.baseVal; }
            if (finalVal < 0) finalVal = 0;
            const k = state.calc.key; if (!db.tally[k]) db.tally[k] = { box: 0, rem: 0, offset: 0 };
            db.tally[k][state.calc.field] = finalVal; closeCalc(); save();
        }
        function closeLoad() { document.getElementById('load-selector').classList.add('hidden'); state.activeTruck = null; refreshUI(); }
    </script>
</body>
</html>
