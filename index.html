<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTS 物流對點轉運系統 (優化覆點與排序穩定版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; background-color: #eff6ff; }
        .hidden-tab { display: none; }
        .compact-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        .calc-btn { @apply h-14 text-xl font-bold rounded-xl bg-gray-100 active:bg-gray-300 flex items-center justify-center shadow-sm; }
        .zone-北 { border-left: 6px solid #3b82f6; } .zone-中 { border-left: 6px solid #10b981; } .zone-南 { border-left: 6px solid #f59e0b; }
        .unit-tag { @apply text-[10px] px-2 py-0.5 rounded-md font-bold; }
        .bg-unit-北 { background: #dbeafe; color: #1e40af; } .bg-unit-中 { background: #d1fae5; color: #065f46; } .bg-unit-南 { background: #ffedd5; color: #9a3412; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 select-none overflow-x-hidden">

    <div class="sticky top-0 z-50 shadow-sm">
        <div id="sync-status" class="bg-yellow-500 text-white text-[11px] text-center py-1 font-bold">
            雲端連線中...
        </div>
        <nav class="bg-white border-b">
            <div class="flex justify-around items-center h-14 max-w-5xl mx-auto">
                <button onclick="switchTab('check')" id="nav-check" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">現場對點</button>
                <button onclick="switchTab('loading')" id="nav-loading" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">精細配載</button>
                <button onclick="switchTab('report')" id="nav-report" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">報表/遞延</button>
                <button onclick="switchTab('manage')" id="nav-manage" class="flex-1 h-full text-sm font-bold text-slate-600 transition-colors">維護管理</button>
            </div>
        </nav>
    </div>

    <main class="p-3 max-w-5xl mx-auto pb-24 mt-2">
        <section id="tab-check" class="space-y-3">
            <div class="flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border">
                <button onclick="askDailyReset()" class="bg-red-500 text-white px-3 py-2 rounded-lg font-bold text-xs active:scale-95">日結清空</button>
                <div id="check-header" class="text-blue-600 font-black text-sm truncate">請先點選廠商卡片</div>
            </div>
            <div id="check-vendor-grid" class="grid compact-grid gap-2"></div>
            <div id="check-workspace" class="hidden space-y-3">
                <div class="flex gap-2 overflow-x-auto pb-1" id="check-unit-tabs"></div>
                <div id="check-items-container" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-loading" class="hidden-tab space-y-4">
            <div class="flex flex-wrap gap-2 bg-white p-3 rounded-xl border shadow-sm" id="loading-unit-tabs"></div>
            <div id="truck-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            <div id="load-selector" class="hidden fixed inset-0 bg-white z-[60] overflow-y-auto p-4">
                <div class="flex justify-between items-center border-b pb-3 mb-4 sticky top-0 bg-white">
                    <div>
                        <h3 id="load-title" class="font-black text-lg text-blue-700">車次配載</h3>
                        <p class="text-[11px] text-slate-400">嚴格對點配額防呆系統 ＆ 路線智能置頂排序</p>
                    </div>
                    <button onclick="closeLoad()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold shadow-md">儲存並關閉</button>
                </div>
                <div id="load-list" class="space-y-4"></div>
            </div>
        </section>

        <section id="tab-report" class="hidden-tab space-y-4">
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button onclick="toggleRepMode('item')" id="btn-rep-item" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600">商品報表明細(覆點)</button>
                <button onclick="toggleRepMode('defer')" id="btn-rep-defer" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500">區域遞延單</button>
            </div>
            
            <div id="rep-vendor-grid" class="grid compact-grid gap-2"></div>
            
            <div id="report-unit-filter-block" class="flex flex-wrap gap-2 bg-white p-2 rounded-xl border shadow-sm"></div>
            
            <div id="defer-menu-block" class="hidden bg-orange-50 border border-orange-200 p-3 rounded-xl flex flex-col sm:flex-row gap-3 items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-orange-800">遞延單據張數選擇：</span>
                    <select id="defer-sheet-select" onchange="renderReport()" class="bg-white border-2 border-orange-300 rounded-lg p-1.5 font-bold text-xs focus:outline-none focus:ring-2 focus:ring-orange-500">
                        <option value="sheet1">📄 遞延第 1 張單 (常規配載)</option>
                        <option value="sheet2">📄 遞延第 2 張單 (二次調撥/殘貨)</option>
                    </select>
                </div>
                <div class="text-[11px] text-slate-500 font-medium">💡 依據下方各單位及分區數據即時進行箱數總計</div>
            </div>

            <div id="report-content" class="space-y-4"></div>
        </section>

        <section id="tab-manage" class="hidden-tab space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-blue-600 pl-2 mb-4">車次設定</h2>
                <div id="m-trucks" class="space-y-3"></div>
                <button onclick="dbAdd('trucks')" class="w-full mt-3 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg text-xs font-bold">+ 新增車次</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-green-600 pl-2 mb-4">廠商與品項分層</h2>
                <div id="m-vendors" class="space-y-4"></div>
                <button onclick="dbAdd('vendors')" class="w-full mt-3 py-2 border-2 border-dashed border-green-300 text-green-600 rounded-lg text-xs font-bold">+ 新增廠商</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h2 class="font-black border-l-4 border-orange-500 pl-2 mb-4">單位與分區設定</h2>
                <div id="m-units" class="space-y-2"></div>
                <button onclick="dbAdd('units')" class="w-full mt-3 py-2 border-2 border-dashed border-orange-300 text-orange-600 rounded-lg text-xs font-bold">+ 新增單位</button>
            </div>
        </section>
    </main>

    <div id="custom-confirm-modal" class="fixed inset-0 bg-black/60 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl space-y-4 transform transition-all scale-95 opacity-0 duration-200" id="confirm-box">
            <div class="flex items-center gap-3">
                <div id="confirm-icon-bg" class="w-10 h-10 rounded-full flex items-center justify-center bg-red-100 text-red-600">
                    <span id="confirm-icon" class="text-xl font-bold">⚠️</span>
                </div>
                <h3 id="confirm-title" class="font-black text-slate-800 text-base">系統確認</h3>
            </div>
            <p id="confirm-msg" class="text-xs text-slate-500 leading-relaxed font-medium">您確定要執行此操作嗎？</p>
            <div class="flex gap-2 justify-end pt-2">
                <button id="confirm-btn-cancel" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-600 text-xs font-bold rounded-xl">取消</button>
                <button id="confirm-btn-action" class="px-5 py-2 bg-red-500 hover:bg-red-600 active:scale-95 text-white text-xs font-bold rounded-xl shadow-sm">確定執行</button>
            </div>
        </div>
    </div>

    <div id="calc-pop" class="fixed inset-0 bg-black/60 z-[100] hidden items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex flex-col">
                    <span id="calc-label" class="font-black text-blue-600 text-lg">數量輸入</span>
                </div>
                <button onclick="closeCalc()" class="text-slate-400 bg-slate-100 p-2 rounded-full">✕</button>
            </div>
            <div class="bg-slate-100 p-6 rounded-2xl text-right mb-6">
                <div id="calc-hist" class="text-slate-400 text-sm h-6 font-mono truncate"></div>
                <div id="calc-disp" class="text-5xl font-black text-slate-800 font-mono truncate">0</div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button class="calc-btn" onclick="cInput('7')">7</button>
                <button class="calc-btn" onclick="cInput('8')">8</button>
                <button class="calc-btn" onclick="cInput('9')">9</button>
                <button class="calc-btn bg-orange-100 text-orange-600" onclick="cOp('+')">+</button>
                <button class="calc-btn" onclick="cInput('4')">4</button>
                <button class="calc-btn" onclick="cInput('5')">5</button>
                <button class="calc-btn" onclick="cInput('6')">6</button>
                <button class="calc-btn bg-orange-100 text-orange-600 font-black text-2xl" onclick="cOp('-')">-</button>
                <button class="calc-btn" onclick="cInput('1')">1</button>
                <button class="calc-btn" onclick="cInput('2')">2</button>
                <button class="calc-btn" onclick="cInput('3')">3</button>
                <button class="calc-btn bg-blue-600 text-white row-span-2 text-2xl" onclick="cOk()">＝</button>
                <button class="calc-btn col-span-2" onclick="cInput('0')">0</button>
                <button class="calc-btn bg-red-500 text-white font-black" onclick="cClear()">C</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 初始化雲端 Firebase 連線
        const FIREBASE_DB_URL = "https://lts-system2-default-rtdb.firebaseio.com/"; 
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
        const dbRef = firebase.database().ref("LTS_SYSTEM_DATA");

        let db = { trucks: [], vendors: [], units: [], tally: {}, loads: {}, tracks: {}, okStatus: {}, trackOffsets: {} };
        const state = { tab: 'check', curV: null, curU: 'all', loadU: 'all', repMode: 'item', repV: null, repU: 'all', calc: null };

        const save = () => {
            document.getElementById('sync-status').innerText = "雲端同步中...";
            document.getElementById('sync-status').className = "bg-blue-600 text-white text-[11px] text-center py-1 font-bold";
            dbRef.set(db).then(() => {
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                refreshUI();
            }).catch(err => {
                document.getElementById('sync-status').innerText = "⚠️ 同步失敗，檢查網路";
                document.getElementById('sync-status').className = "bg-red-600 text-white text-[11px] text-center py-1 font-bold";
            });
        };

        dbRef.on('value', (snapshot) => {
            const cloudData = snapshot.val();
            if (cloudData) {
                db = cloudData;
                if(!db.trucks) db.trucks = []; if(!db.vendors) db.vendors = []; if(!db.units) db.units = [];
                if(!db.tally) db.tally = {}; if(!db.loads) db.loads = {}; if(!db.tracks) db.tracks = {};
                if(!db.okStatus) db.okStatus = {}; if(!db.trackOffsets) db.trackOffsets = {};
                document.getElementById('sync-status').innerText = "● 雲端已同步 (實時連線)";
                document.getElementById('sync-status').className = "bg-green-600 text-white text-[11px] text-center py-1 font-bold";
                refreshUI();
            } else { save(); }
        });

        function switchTab(t) {
            state.tab = t;
            ['check', 'loading', 'report', 'manage'].forEach(x => {
                document.getElementById('tab-' + x).classList.add('hidden-tab');
                document.getElementById('nav-' + x).classList.remove('nav-active');
            });
            document.getElementById('tab-' + t).classList.remove('hidden-tab');
            document.getElementById('nav-' + t).classList.add('nav-active');
            refreshUI();
        }

        function refreshUI() {
            if (state.tab === 'check') renderCheck();
            if (state.tab === 'loading') renderLoading();
            if (state.tab === 'report') renderReport();
            if (state.tab === 'manage') renderManage();
        }

        function showCustomConfirm({ title, msg, isDanger, onConfirm }) {
            const modal = document.getElementById('custom-confirm-modal');
            const box = document.getElementById('confirm-box');
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-msg').innerText = msg;
            const btnAction = document.getElementById('confirm-btn-action');
            
            if (isDanger) {
                btnAction.className = "px-5 py-2 bg-red-500 hover:bg-red-600 text-white text-xs font-bold rounded-xl";
            } else {
                btnAction.className = "px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl";
            }
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => box.classList.remove('scale-95', 'opacity-0'), 10);
            
            btnAction.onclick = () => { onConfirm(); modal.classList.replace('flex', 'hidden'); };
            document.getElementById('confirm-btn-cancel').onclick = () => modal.classList.replace('flex', 'hidden');
        }

        function getFinalBox(vName, uName, pName) {
            const key = `${vName}_${uName}_${pName}`;
            const data = db.tally[key] || { box: 0, rem: 0, offset: 0 };
            const vendor = db.vendors.find(v => v.name === vName);
            if (vendor && vendor.mode === 'sum') {
                return { total: Math.max(0, (data.box || 0) + (data.offset || 0)), display: `${data.box}箱` };
            }
            const carry = (data.rem || 0) > 0 ? 1 : 0;
            return { total: Math.max(0, (data.box || 0) + carry + (data.offset || 0)), display: `${data.box||0}箱${data.rem||0}尾` };
        }

        // ==================== 現場對點區 ====================
        function renderCheck() {
            const vGrid = document.getElementById('check-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="state.curV='${v.name}';refreshUI()" class="p-2 rounded-xl border-2 text-[11px] font-black shadow-sm ${state.curV===v.name?'border-blue-600 bg-blue-50 text-blue-700':'bg-white border-transparent'}">
                    ${v.name}
                </button>
            `).join('');

            if (state.curV) {
                const vendor = db.vendors.find(v => v.name === state.curV);
                if(!vendor) return;
                document.getElementById('check-workspace').classList.remove('hidden');
                document.getElementById('check-header').innerText = `正在點收：${state.curV}`;
                
                document.getElementById('check-unit-tabs').innerHTML = `<button onclick="state.curU='all';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU==='all'?'bg-blue-600 text-white':'bg-white border'}">全部展開</button>` +
                    db.units.map(u => `<button onclick="state.curU='${u.name}';refreshUI()" class="px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap ${state.curU===u.name?'bg-blue-600 text-white':'bg-white border'}">${u.name}</button>`).join('');

                const units = state.curU === 'all' ? db.units : db.units.filter(u => u.name === state.curU);
                document.getElementById('check-items-container').innerHTML = units.map(u => `
                    <div class="bg-white p-3 rounded-xl shadow-sm zone-${u.zone}">
                        <div class="flex justify-between items-center mb-2 border-b pb-1">
                            <span class="font-black text-xs">${u.name}</span>
                            <span class="unit-tag bg-unit-${u.zone}">${u.zone}區 / 單${u.type}</span>
                        </div>
                        ${vendor.mode==='detail' ? (vendor.items||[]).map(p => {
                            const key = `${vendor.name}_${u.name}_${p.name}`;
                            const d = db.tally[key] || { box: 0, rem: 0, offset: 0 };
                            return `
                                <div class="flex items-center gap-2 py-1.5 border-b last:border-0 text-xs">
                                    <div class="flex-1 font-bold">${p.name}<span class="text-[10px] text-slate-400 block">箱入:${p.pcs}</span></div>
                                    <div onclick="openCalc('${key}','box',${d.box||0},'${u.name}-${p.name}(箱)')" class="w-10 h-8 bg-slate-100 font-bold rounded flex items-center justify-center">${d.box||0}</div>
                                    <div onclick="openCalc('${key}','rem',${d.rem||0},'${u.name}-${p.name}(尾)')" class="w-10 h-8 bg-blue-50 text-blue-600 font-bold rounded flex items-center justify-center">${d.rem||0}</div>
                                    <div class="text-right w-12 font-black text-blue-600">${getFinalBox(vendor.name, u.name, p.name).total} 箱</div>
                                </div>`;
                        }).join('') : `
                            <div class="flex justify-between items-center p-1 text-xs"><span>總箱點收</span>
                                <div onclick="openCalc('${vendor.name}_${u.name}_SUM','box',${(db.tally[`${vendor.name}_${u.name}_SUM`]||{box:0}).box||0},'總箱')" class="w-16 h-8 bg-slate-100 text-center font-bold rounded flex items-center justify-center">${(db.tally[`${vendor.name}_${u.name}_SUM`]||{box:0}).box||0}</div>
                            </div>`}
                    </div>
                `).join('');
            } else {
                document.getElementById('check-workspace').classList.add('hidden');
            }
        }

        // ==================== 精細配載區 ====================
        function renderLoading() {
            // 🎯 改良點：展開式單位選擇按鈕，移除原本滾動條樣式，讓外層元件可以自動折行顯示
            document.getElementById('loading-unit-tabs').innerHTML = `
                <button onclick="state.loadU='all';renderLoading()" class="px-3 py-1.5 rounded-lg text-xs font-black ${state.loadU==='all'?'bg-blue-600 text-white':'bg-slate-100 text-slate-600'}">全部展開</button>
            ` + db.units.map(u => `
                <button onclick="state.loadU='${u.name}';renderLoading()" class="px-3 py-1.5 rounded-lg text-xs font-black ${state.loadU===u.name?'bg-blue-600 text-white':'bg-slate-100 text-slate-600'}">${u.name}</button>
            `).join('');

            let tList = state.loadU === 'all' ? db.trucks : db.trucks.filter(t => t.targets && t.targets.includes(state.loadU));
            document.getElementById('truck-grid').innerHTML = tList.map(t => `
                <div onclick="openLoad('${t.name}')" class="bg-white p-3 rounded-xl border border-l-4 border-l-blue-600 shadow-sm active:bg-slate-50">
                    <div class="flex justify-between font-black text-xs"><span>🚚 ${t.name}</span><span class="text-blue-600">限額 ${t.limit} 箱</span></div>
                    <div class="text-[10px] text-slate-400 mt-1">路線：${(t.targets||[]).join(', ')||'未設定'}</div>
                </div>
            `).join('');
        }

        function openLoad(tn) {
            document.getElementById('load-selector').classList.remove('hidden');
            document.getElementById('load-title').innerText = `${tn} 智能配載清單`;
            let html = "<p class='text-xs text-slate-400 mb-2'>已根據現場對點數據載入，請直接輸入各車次配載箱數：</p>";
            
            db.units.forEach(u => {
                html += `<div class="bg-slate-50 p-2 rounded-lg mb-2 font-bold text-xs border zone-${u.zone}">${u.name} (${u.zone}區)</div>`;
                db.vendors.forEach(v => {
                    let items = v.mode === 'detail' ? v.items : [{name:'SUM'}];
                    (items||[]).forEach(p => {
                        let key = `${v.name}_${u.name}_${p.name}`;
                        let max = getFinalBox(v.name, u.name, p.name).total;
                        if(max > 0) {
                            if(!db.loads[tn]) db.loads[tn] = {};
                            let current = db.loads[tn][key] || 0;
                            html += `
                                <div class="flex justify-between items-center bg-white p-2 border-b text-xs pl-4">
                                    <div><span class="font-black">${v.name}</span> - ${p.name==='SUM'?'總箱貨物':p.name} <span class="text-[10px] text-slate-400">(對點總量:${max})</span></div>
                                    <div class="flex items-center gap-1">
                                        <input type="number" class="w-14 border rounded text-center font-bold p-1" value="${current}" onchange="saveLoad('${tn}','${key}',this.value,${max})">
                                        <span>箱</span>
                                    </div>
                                </div>`;
                        }
                    });
                });
            });
            document.getElementById('load-list').innerHTML = html;
        }
        function saveLoad(tn, key, val, max) {
            let v = Math.min(max, Math.max(0, parseInt(val) || 0));
            if(!db.loads[tn]) db.loads[tn] = {};
            db.loads[tn][key] = v;
            save();
        }
        function closeLoad() { document.getElementById('load-selector').classList.add('hidden'); }

        // ==================== 報表 / 區域遞延單區 ====================
        function toggleRepMode(m) {
            state.repMode = m;
            const btnItem = document.getElementById('btn-rep-item');
            const btnDefer = document.getElementById('btn-rep-defer');
            const unitBlock = document.getElementById('report-unit-filter-block');
            const deferBlock = document.getElementById('defer-menu-block');
            
            if (m === 'item') {
                btnItem.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-blue-600";
                btnDefer.className = "flex-1 py-2 rounded-lg font-bold text-sm text-slate-500";
                unitBlock.classList.remove('hidden'); // 🎯 穩定機制：商品報表明細下，篩選塊強制呈現
                deferBlock.classList.add('hidden');
            } else {
                btnDefer.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-orange-600";
                btnItem.className = "flex-1 py-2 rounded-lg font-bold text-sm text-slate-500";
                unitBlock.classList.add('hidden');
                deferBlock.classList.remove('hidden'); // 呈現遞延單專用雙選單
            }
            renderReport();
        }

        function renderReport() {
            // 渲染廠商過濾欄
            const vGrid = document.getElementById('rep-vendor-grid');
            vGrid.innerHTML = db.vendors.map(v => `
                <button onclick="state.repV='${v.name}';renderReport()" class="p-2 rounded-lg border text-[10px] font-bold ${state.repV===v.name?'bg-slate-800 text-white':'bg-white text-slate-500'}">
                    ${v.name}
                </button>
            `).join('');

            // 🎯 核心修復：商品報表過濾控制列（穩定生成，不閃爍消失）
            const uFilterBlock = document.getElementById('report-unit-filter-block');
            uFilterBlock.innerHTML = `<button onclick="state.repU='all';renderReport()" class="px-3 py-1 rounded-full text-[10px] font-bold ${state.repU==='all'?'bg-blue-600 text-white':'bg-slate-100'}" >全部單位</button>` + 
                db.units.map(u => `<button onclick="state.repU='${u.name}';renderReport()" class="px-3 py-1 rounded-full text-[10px] font-bold ${state.repU===u.name?'bg-blue-600 text-white':'bg-slate-100'}">${u.name}</button>`).join('');

            const content = document.getElementById('report-content');
            if(!state.repV) {
                content.innerHTML = `<div class="text-center py-8 text-slate-400 font-bold text-xs">請先於上方選擇報表查詢之「目標廠商」</div>`;
                return;
            }

            // 模式 1：恢復點擊版的「商品明細覆點報表模式」(欠貨, 補貨, 箱數總計)
            if (state.repMode === 'item') {
                let currentVendor = db.vendors.find(v => v.name === state.repV);
                let targetUnits = state.repU === 'all' ? db.units : db.units.filter(u => u.name === state.repU);
                
                let html = `<div class="bg-white p-3 rounded-xl shadow-sm border border-blue-200">
                    <h3 class="text-xs font-black text-blue-700 mb-2">📋 ${state.repV} - 商品覆點明細清單</h3>`;
                
                targetUnits.forEach(u => {
                    html += `<div class="mt-3 border-l-4 zone-${u.zone} pl-2 py-0.5 bg-slate-50 font-black text-xs">${u.name}</div>`;
                    let items = currentVendor.mode === 'detail' ? currentVendor.items : [{name:'SUM'}];
                    
                    (items||[]).forEach(p => {
                        let trackKey = `${state.repV}_${u.name}_${p.name}`;
                        if(!db.tracks[trackKey]) db.tracks[trackKey] = [0, 0, 0]; // [實收, 補貨, 欠貨]
                        let trackData = db.tracks[trackKey];
                        let finalBoxTotal = getFinalBox(state.repV, u.name, p.name).total;

                        html += `
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between py-2 border-b text-xs pl-2 gap-2">
                                <div class="font-bold flex-1">${p.name==='SUM'?'總箱數貨物':p.name} <span class="text-[10px] text-slate-400">(對點數:${finalBoxTotal})</span></div>
                                <div class="flex items-center gap-2 flex-wrap">
                                    <label class="flex items-center gap-1 text-[11px]">
                                        <span class="text-slate-500">實收:</span>
                                        <input type="number" class="w-12 border rounded text-center p-0.5" value="${trackData[0]||0}" onchange="updateTrackVal('${trackKey}',0,this.value)">
                                    </label>
                                    <label class="flex items-center gap-1 text-[11px]">
                                        <span class="text-blue-600">補貨:</span>
                                        <input type="number" class="w-12 border rounded text-center p-0.5 text-blue-600 font-bold" value="${trackData[1]||0}" onchange="updateTrackVal('${trackKey}',1,this.value)">
                                    </label>
                                    <label class="flex items-center gap-1 text-[11px]">
                                        <span class="text-red-500">欠貨:</span>
                                        <input type="number" class="w-12 border rounded text-center p-0.5 text-red-600 font-bold" value="${trackData[2]||0}" onchange="updateTrackVal('${trackKey}',2,this.value)">
                                    </label>
                                    <div class="bg-slate-100 px-2 py-1 rounded text-[10px] font-black text-slate-700">
                                        箱數總計: ${(parseInt(trackData[0])||0) + (parseInt(trackData[1])||0)}
                                    </div>
                                </div>
                            </div>`;
                    });
                });
                html += `</div>`;
                content.innerHTML = html;
            } 
            
            // 模式 2：優化版「區域遞延單設計」(整合下拉式分單選單、全區域箱數統計)
            else if (state.repMode === 'defer') {
                let selectedSheet = document.getElementById('defer-sheet-select').value; // 獲取第二下拉選單結果
                let currentVendor = db.vendors.find(v => v.name === state.repV);
                
                // 定義區域加總統計變數
                let zoneTotals = { '北': 0, '中': 0, '南': 0 };
                let unitTotals = {};
                
                db.units.forEach(u => { unitTotals[u.name] = 0; });
                
                // 統計數據核心
                db.units.forEach(u => {
                    let items = currentVendor.mode === 'detail' ? currentVendor.items : [{name:'SUM'}];
                    (items||[]).forEach(p => {
                        let finalBoxTotal = getFinalBox(state.repV, u.name, p.name).total;
                        // 模擬依據單據選擇過濾 (第1張單計入主貨，第2張單調配殘貨統計)
                        if (selectedSheet === 'sheet2') {
                            let trackKey = `${state.repV}_${u.name}_${p.name}`;
                            finalBoxTotal = db.tracks[trackKey] ? (db.tracks[trackKey][2] || 0) : 0; // 範例：第2張殘貨遞延單追蹤欠補數據
                        }
                        zoneTotals[u.zone] += finalBoxTotal;
                        unitTotals[u.name] += finalBoxTotal;
                    });
                });

                let html = `
                    <div class="bg-gradient-to-br from-orange-50 to-white p-4 rounded-xl border border-orange-200 shadow-sm space-y-4">
                        <div class="flex justify-between items-center border-b border-orange-200 pb-2">
                            <h3 class="text-sm font-black text-orange-700">📊 遞延分析 - 當前選擇：${selectedSheet === 'sheet1' ? '第1張常規單' : '第2張二次調撥單'}</h3>
                            <span class="text-xs bg-orange-600 text-white font-bold px-2 py-0.5 rounded">${state.repV}</span>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-3">
                            <div class="bg-blue-50 p-2 rounded-lg border border-blue-200 text-center">
                                <div class="text-[10px] text-blue-700 font-bold">🔵 北區總箱數</div>
                                <div class="text-xl font-black text-blue-800">${zoneTotals['北']} 箱</div>
                            </div>
                            <div class="bg-green-50 p-2 rounded-lg border border-green-200 text-center">
                                <div class="text-[10px] text-green-700 font-bold">🟢 中區總箱數</div>
                                <div class="text-xl font-black text-green-800">${zoneTotals['中']} 箱</div>
                            </div>
                            <div class="bg-orange-50 p-2 rounded-lg border border-orange-200 text-center">
                                <div class="text-[10px] text-orange-700 font-bold">🟡 南區總箱數</div>
                                <div class="text-xl font-black text-orange-800">${zoneTotals['南']} 箱</div>
                            </div>
                        </div>

                        <div class="space-y-2 pt-2">
                            <h4 class="text-xs font-black text-slate-700">📌 LTS 各轉運站單位箱數明細：</h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                ${db.units.map(u => `
                                    <div class="flex justify-between items-center bg-white p-2.5 rounded-lg border text-xs shadow-2xs zone-${u.zone}">
                                        <span class="font-bold text-slate-800">${u.name} <small class="text-slate-400 font-normal">(${u.zone}區)</small></span>
                                        <span class="font-black text-blue-600 bg-slate-50 px-2 py-1 rounded">${unitTotals[u.name]} 箱</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>`;
                content.innerHTML = html;
            }
        }

        function updateTrackVal(key, idx, val) {
            if(!db.tracks[key]) db.tracks[key] = [0, 0, 0];
            db.tracks[key][idx] = parseInt(val) || 0;
            save();
        }

        // ==================== 維護管理區（新增上下調整順序功能） ====================
        function renderManage() {
            // 1. 車次管理排序
            document.getElementById('m-trucks').innerHTML = db.trucks.map((t, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border text-xs">
                    <span class="font-bold">🚚 ${t.name} (限額:${t.limit}箱)</span>
                    <div class="flex gap-1">
                        <button onclick="moveItem('trucks', ${i}, -1)" class="bg-white border px-2 py-1 rounded text-[11px] font-bold hover:bg-slate-100">🔼 上移</button>
                        <button onclick="moveItem('trucks', ${i}, 1)" class="bg-white border px-2 py-1 rounded text-[11px] font-bold hover:bg-slate-100">🔽 下移</button>
                        <button onclick="dbDel('trucks', ${i})" class="text-red-500 bg-white border border-red-200 px-2 py-1 rounded text-[11px] font-bold">✕ 刪除</button>
                    </div>
                </div>
            `).join('');

            // 2. 廠商管理排序
            document.getElementById('m-vendors').innerHTML = db.vendors.map((v, i) => `
                <div class="bg-slate-50 p-2 rounded-lg border text-xs space-y-1">
                    <div class="flex justify-between items-center">
                        <span class="font-black text-green-700">🏢 ${v.name} (${v.mode==='detail'?'品層明細':'總箱計'})</span>
                        <div class="flex gap-1">
                            <button onclick="moveItem('vendors', ${i}, -1)" class="bg-white border px-1.5 py-0.5 rounded text-[10px] font-bold">🔼 上移</button>
                            <button onclick="moveItem('vendors', ${i}, 1)" class="bg-white border px-1.5 py-0.5 rounded text-[10px] font-bold">🔽 下移</button>
                            <button onclick="dbDel('vendors', ${i})" class="text-red-500 bg-white border border-red-100 px-1.5 py-0.5 rounded text-[10px] font-bold">✕ 刪除</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // 3. 單位分區管理排序
            document.getElementById('m-units').innerHTML = db.units.map((u, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border text-xs zone-${u.zone}">
                    <span class="font-bold">📍 ${u.name} (${u.zone}區 / 單${u.type})</span>
                    <div class="flex gap-1">
                        <button onclick="moveItem('units', ${i}, -1)" class="bg-white border px-2 py-1 rounded text-[11px] font-bold">🔼 上移</button>
                        <button onclick="moveItem('units', ${i}, 1)" class="bg-white border px-2 py-1 rounded text-[11px] font-bold">🔽 下移</button>
                        <button onclick="dbDel('units', ${i})" class="text-red-500 bg-white border border-red-200 px-2 py-1 rounded text-[11px] font-bold">✕ 刪除</button>
                    </div>
                </div>
            `).join('');
        }

        // 🎯 新增核心機制：上下移動項目進行位置順序調整
        function moveItem(type, index, direction) {
            let targetArr = db[type];
            let newIndex = index + direction;
            if (newIndex < 0 || newIndex >= targetArr.length) return; // 邊界防呆
            
            // 陣列元素互換位置
            let temp = targetArr[index];
            targetArr[index] = targetArr[newIndex];
            targetArr[newIndex] = temp;
            
            save(); // 即時寫入並上傳雲端數據庫庫
        }

        function dbAdd(type) {
            let name = prompt("請輸入新增名稱:");
            if(!name) return;
            if(type==='trucks') db.trucks.push({name, limit: 300, targets:[]});
            if(type==='vendors') db.vendors.push({name, mode:'detail', items:[{name:'新商品', pcs:10}]});
            if(type==='units') db.units.push({name, zone:'北', type:'A'});
            save();
        }
        function dbDel(type, idx) {
            showCustomConfirm({
                title: "⚠️ 刪除確認",
                msg: "確定要刪除此設定項目嗎？刪除後對應配載數據可能受影響。",
                isDanger: true,
                onConfirm: () => { db[type].splice(idx, 1); save(); }
            });
        }
        function askDailyReset() {
            showCustomConfirm({
                title: "🚨 全台日結清空警告",
                msg: "這將會清空今日所有對點、配載、追蹤數據！確定執行嗎？",
                isDanger: true,
                onConfirm: () => { db.tally={}; db.loads={}; db.tracks={}; db.okStatus={}; save(); }
            });
        }

        // 計算彈窗處理
        let calcTarget={ key:'', field:'' };
        function openCalc(key, field, currentVal, label) {
            calcTarget={key, field};
            document.getElementById('calc-label').innerText = label;
            document.getElementById('calc-disp').innerText = currentVal;
            document.getElementById('calc-hist').innerText = '';
            document.getElementById('calc-pop').classList.remove('hidden');
        }
        function cInput(v) {
            let d = document.getElementById('calc-disp');
            if(d.innerText==='0') d.innerText = v; else d.innerText += v;
        }
        function cOp(op) {
            let d = document.getElementById('calc-disp');
            let h = document.getElementById('calc-hist');
            h.innerText = d.innerText + ' ' + op;
            d.innerText = '0';
        }
        function cOk() {
            let d = document.getElementById('calc-disp');
            let h = document.getElementById('calc-hist');
            let res = 0;
            if(h.innerText.includes('+')) res = (parseInt(h.innerText) || 0) + (parseInt(d.innerText) || 0);
            else if(h.innerText.includes('-')) res = (parseInt(h.innerText) || 0) - (parseInt(d.innerText) || 0);
            else res = parseInt(d.innerText) || 0;
            
            if(!db.tally[calcTarget.key]) db.tally[calcTarget.key] = {box:0, rem:0, offset:0};
            db.tally[calcTarget.key][calcTarget.field] = Math.max(0, res);
            closeCalc();
            save();
        }
        function cClear() { document.getElementById('calc-disp').innerText = '0'; document.getElementById('calc-hist').innerText = ''; }
        function closeCalc() { document.getElementById('calc-pop').classList.add('hidden'); }

        // 初始化切換至對點分頁
        switchTab('check');
    </script>
</body>
</html>
